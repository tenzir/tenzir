created: 2026-06-12
title: Cloud and streaming operator updates
intro: >-
  This release adds Amazon Kinesis operators, regex Kafka topic selection, Google
  SecOps Chronicle import support, and inline drop_null_fields cleanup for cloud and
  streaming pipelines. It also improves HTTP server bind failures, package field defaults,
  and timeout flushing for OpenSearch and CloudWatch sinks.
