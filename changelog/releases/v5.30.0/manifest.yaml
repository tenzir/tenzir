created: 2026-03-31
title: OIDC authentication for AWS operators
intro: >-
  This release adds OIDC web identity authentication for AWS operators, so you can
  assume AWS roles from external identity providers without long-lived credentials.
  It also speeds up logical and conditional expression evaluation and fixes several
  crashes and configuration diagnostics.
