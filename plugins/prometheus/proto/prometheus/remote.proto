//
// Sanitized for Tenzir: gogoproto options/imports and read-side messages were
// removed without changing package names, message names, or field numbers used
// by Remote Write.

syntax = "proto3";
package prometheus;

import "prometheus/types.proto";

message WriteRequest {
  repeated prometheus.TimeSeries timeseries = 1;
  reserved 2;
  repeated prometheus.MetricMetadata metadata = 3;
}
