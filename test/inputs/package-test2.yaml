name: Test Package with inline config
author: Tenzir
id: test2

description: |
  A package used in integration tests.
  Unlike `test1`, this package has a missing input 'world' that needs
  to be specified when adding the package.

inputs:
  hello:
    name: The string "hello"
    description: Note, this variable has a default.
    type: string
    default: Hello
  world:
    name: The string "world"
    description: Note, this variable doesn't have a default.
    type: string

contexts:
  test2-context:
    type: lookup-table
    description: A table that contains nothing.

  disabled-test-context:
    type: lookup-table
    description: This context is disabled and should not influence the result.
    disabled: true

pipelines:
  nop:
    name: Do nothing at all.
    description: This pipeline does nothing.
    definition: |
      version
      discard

  import-version:
    name: Import an event
    description: Imports an event
    definition: |
      from {
        message: "{{ inputs.hello }} {{ inputs.world }}"
      }
      import

  disabled-pipeline:
    name: Disabled pipeline
    description: This pipeline would generate an error if it wasn't disabled.
    definition: |
      version
      discard
    disabled: true

  unstoppable-pipeline:
    name: Unstoppable pipeline
    description: This pipeline is unstoppable.
    definition: |
      version
      discard
    unstoppable: true
