name: to_iceberg_ocsf_layouts_double
description: >-
  Append 819,200 prepared sparse OCSF events using the same layouts as
  to_iceberg_ocsf_layouts to measure the effect of doubling input volume.
tags:
  benchmark: iceberg
  dataset: ocsf-1.8
  input: synthetic-repeat
  workload: mixed
  volume: double
inputs:
  main:
    path: ocsf/iceberg-1.8-seeds.ndjson
    source:
      url: ../../fixtures/iceberg/ocsf-1.8-seeds.ndjson
      num_events: 819200
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - iceberg:
      inputs: [main]
      expected_events: 819200
      expected_seed_events: 25
      batch_size: 4096
runtime:
  warmup_runs: 0
  measurement_runs: 3
  timeout_seconds: 3600
