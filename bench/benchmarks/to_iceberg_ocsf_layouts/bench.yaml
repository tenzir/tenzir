name: to_iceberg_ocsf_layouts
description: >-
  Append 409,600 prepared sparse OCSF events using unified, category, and class table
  layouts, with a discard control for the shared generation cost.
tags:
  benchmark: iceberg
  dataset: ocsf-1.8
  input: synthetic-repeat
  workload: mixed
inputs:
  main:
    path: ocsf/iceberg-1.8-seeds.ndjson
    source:
      url: ../../fixtures/iceberg/ocsf-1.8-seeds.ndjson
      num_events: 409600
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - iceberg:
      inputs: [main]
      expected_events: 409600
      expected_seed_events: 25
      batch_size: 4096
runtime:
  warmup_runs: 0
  measurement_runs: 3
  timeout_seconds: 3600
