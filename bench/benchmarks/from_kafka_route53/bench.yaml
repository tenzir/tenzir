name: from_kafka_route53
description: Read the CloudWatch Route53 dataset from Kafka and discard the parsed events.
tags:
  benchmark: kafka
  dataset: route53
inputs:
  main:
    path: cloudwatch/route53.ndjson
    repetitions: 100
    source:
      url: https://datasets.tenzir.tools/CloudWatch/route53.ndjson
      num_events: 2586
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - kafka:
      inputs: [main]
      topic: from-kafka-route53-bench
runtime:
  warmup_runs: 1
  measurement_runs: 3
  timeout_seconds: 1800
