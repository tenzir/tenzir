---
name: from_file_route53_ocsf
description: >-
  Read the CloudWatch Route53 dataset from a file, map it to OCSF DNS
  Activity, and discard the events.
tags:
  benchmark: file
  dataset: route53
  transform: ocsf
input:
  path: cloudwatch/route53.ndjson
  source: https://datasets.tenzir.tools/CloudWatch/route53.ndjson
  events: 25860
  measure: true
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - repeat_input:
      repetitions: 10
runtime:
  warmup_runs: 1
  measurement_runs: 3
  timeout_seconds: 900
