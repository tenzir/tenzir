---
name: from_file_route53_ocsf
description: >-
  Read the CloudWatch Route53 dataset from a file, map it to OCSF DNS
  Activity, and discard the events.
tags:
  benchmark: file
  dataset: route53
  transform: ocsf
inputs:
  main:
    path: cloudwatch/route53.ndjson
    repetitions: 10
    source:
      url: https://datasets.tenzir.tools/CloudWatch/route53.ndjson
      num_events: 2586
env:
  TENZIR_CONSOLE_FORMAT: none
runtime:
  warmup_runs: 1
  measurement_runs: 3
  timeout_seconds: 900
