---
name: match_vs_if
description: >-
  Compare statement-level match dispatch against an equivalent if/else chain
  over repeated synthetic events.
tags:
  operators: match
  baseline: if
inputs:
  main:
    path: empty.ndjson
    source:
      num_events: 5000000
env:
  TENZIR_CONSOLE_FORMAT: none
runtime:
  warmup_runs: 1
  measurement_runs: 3
  timeout_seconds: 900
