name: to_iceberg_ocsf_interleaved
description: >-
  Append 409,600 sparse OCSF events arriving as fine-grained interleaved
  slices: 128-event schema-homogeneous slices cycling through all 25 event
  classes. Complements to_iceberg_ocsf_layouts, which feeds the same events as
  ideal 4,096-event batches; the difference isolates the operator's per-slice
  overhead on realistic multi-class streams.
tags:
  benchmark: iceberg
  dataset: ocsf-1.8
  input: synthetic-repeat
  workload: mixed-interleaved
inputs:
  main:
    path: ocsf/iceberg-1.8-seeds.ndjson
    source:
      url: ../../fixtures/iceberg/ocsf-1.8-seeds.ndjson
      num_events: 409600
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - iceberg:
      inputs: [main]
      expected_events: 409600
      expected_seed_events: 25
      batch_size: 128
runtime:
  warmup_runs: 0
  measurement_runs: 3
  timeout_seconds: 3600
