name: to_kinesis_route53_20ms
description: >-
  Write the CloudWatch Route53 dataset to a mock Kinesis stream with 20ms of
  artificial request latency, modeling the in-region RTT regime where request
  parallelism dominates throughput.
tags:
  benchmark: kinesis
  dataset: route53
inputs:
  main:
    path: cloudwatch/route53.ndjson
    repetitions: 100
    source:
      url: https://datasets.tenzir.tools/CloudWatch/route53.ndjson
      num_events: 2586
env:
  TENZIR_CONSOLE_FORMAT: none
fixtures:
  - kinesis:
      inputs: [main]
      stream: to-kinesis-route53-20ms-bench
      latency_ms: 20
runtime:
  warmup_runs: 1
  measurement_runs: 3
  timeout_seconds: 1800
