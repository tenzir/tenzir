name: Style Check
on:
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    types:
      - checks_requested

env:
  DEBIAN_FRONTEND: noninteractive
jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - name: Install Nix
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/0d70460758949966e91d9ecb823b821f963cefbb.tar.gz
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
      - name: Configure ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}
      - name: Check out submodule
        run: |
          git submodule update --init --recommend-shallow contrib/tenzir-plugins
          sleep 5
          GH_TOKEN="${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}" nix/update-plugins.sh
      - run: |
          nix -L flake check

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          pip install --upgrade ansible ansible-lint
          ansible-galaxy collection install ansible.posix
          ansible-lint --strict --profile production ansible

  black:
    name: black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          set -eo pipefail
          pip install --upgrade black
          # Note: black fails when it doesn't have to do anything.
          git add --intent-to-add --all
          git diff --submodule=diff --name-only --no-color --diff-filter=ACM $(git merge-base origin/main HEAD) |
            tr '\n' '\0' |
            grep '\.py$' |
            xargs -0 --no-run-if-empty black || true
          git diff --submodule=diff --exit-code

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          set -eo pipefail
          CLANG_FORMAT_VERSION=$(cat .clang-format-version)
          pip install --upgrade clang-format=="${CLANG_FORMAT_VERSION}"
          which clang-format
          clang-format --version
          git add --intent-to-add --all
          git diff --submodule=diff -U0 --no-color $(git merge-base origin/main HEAD) -- \
              '*.cpp' '*.cpp.in' '*.hpp' '*.hpp.in' |
            scripts/clang-format-diff.py -p1

  cmake-format:
    name: cmake-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - name: Configure ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}
      - name: Check out submodule
        run: |
          git submodule update --init --recommend-shallow contrib/tenzir-plugins
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Run cmake-format
        run: |
          set -eo pipefail
          git add --intent-to-add --all
          git ls-files -z -- 'CMakeLists.txt' '*.cmake' |
            xargs -0 uvx --from cmakelang cmake-format --in-place
          git -C contrib/tenzir-plugins ls-files -z -- 'CMakeLists.txt' '*.cmake' |
            xargs -0 uvx --from cmakelang cmake-format --in-place
          git diff --quiet --submodule=diff --exit-code || {
            echo '::error title=cmake-format::Please run `cmake-format --in-place path/to/file.cmake` or apply the following diff directly:'
            git diff --submodule=diff --exit-code
          }

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Check
        run: |
          npm install --no-save markdownlint-cli
          npx markdownlint --ignore libtenzir/aux --ignore node_modules .

  ocsf-schemas:
    name: ocsf-schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            ocsf:
              - 'scripts/ocsf-schemas.py'
              - 'schema/types/ocsf/**'
              - 'libtenzir/include/tenzir/ocsf_*.inc'
      - if: steps.changes.outputs.ocsf == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.changes.outputs.ocsf == 'true'
        uses: astral-sh/setup-uv@v5
      - if: steps.changes.outputs.ocsf == 'true'
        name: Check
        run: |
          set -eo pipefail
          uv run --script scripts/ocsf-schemas.py
          git add --intent-to-add --all
          git diff --submodule=diff --exit-code || {
            echo '::error title=ocsf-schemas::Please run `uv run --script scripts/ocsf-schemas.py` and commit the generated changes.'
            git diff --submodule=diff --exit-code
          }

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          set -eo pipefail
          pip install --upgrade shellcheck-py
          git add --intent-to-add --all
          git diff --submodule=diff --name-only --no-color --diff-filter=ACM $(git merge-base origin/main HEAD) |
            scripts/shellcheck.bash

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          set -eo pipefail
          pip install --upgrade shfmt-py
          git add --intent-to-add --all
          git ls-files --recurse-submodules -z -- '*.sh' '*.bash' |
            xargs -0 shfmt -l -w
          git diff --submodule=diff --exit-code

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: hashicorp/setup-terraform@v3
      - name: Check
        run: |
          terraform fmt -check -recursive -diff

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          set -eo pipefail
          pip install --upgrade yamllint
          git add --intent-to-add --all
          git ls-files --recurse-submodules -z -- '*.yaml' '.yml' |
            xargs -0 yamllint

  style-check:
    needs:
      - ansible-lint
      - black
      - clang-format
      - cmake-format
      - markdownlint
      - ocsf-schemas
      - shellcheck
      - shfmt
      - terraform-fmt
      - yamllint
    if: always()
    runs-on: ubuntu-latest
    name: Style Check
    steps:
      - name: Failure
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          # This check runs after any other job failed.
          exit 1
      - name: Success
        run: |
          # This check runs after all other jobs are done or skipped
          exit 0
