name: Style Check
on:
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    types:
      - checks_requested

env:
  DEBIAN_FRONTEND: noninteractive
jobs:
  treefmt:
    name: treefmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - name: Install Nix
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/0d70460758949966e91d9ecb823b821f963cefbb.tar.gz
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
      - name: Configure ssh-agent
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387  # v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}
      - name: Run treefmt
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          # CI intentionally uses Nix/treefmt as the authoritative style check.
          # Lefthook remains a non-Nix local guard for pushed files and local
          # automated fixes before pushing. Limit treefmt to changed paths so
          # unrelated tree-wide formatting drift does not block focused PRs.
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          base="origin/$BASE_REF"
          main_files=()
          tenzir_plugins_files=()
          tenzir_plugins_gitlink_changed=false
          while IFS= read -r file; do
            case "$file" in
              contrib/tenzir-plugins)
                tenzir_plugins_gitlink_changed=true
                ;;
              contrib/tenzir-plugins/*)
                tenzir_plugins_files+=("$file")
                ;;
              *)
                main_files+=("$file")
                ;;
            esac
          done < <(git diff --name-only --diff-filter=ACMR "$base" HEAD)

          if [ "${#main_files[@]}" -gt 0 ]; then
            nix run .#format -- --fail-on-change "${main_files[@]}"
          fi
          if [ "$tenzir_plugins_gitlink_changed" = true ] || [ "${#tenzir_plugins_files[@]}" -gt 0 ]; then
            git submodule update --init contrib/tenzir-plugins
            if [ "$tenzir_plugins_gitlink_changed" = true ]; then
              plugins_base=$(git rev-parse "$base:contrib/tenzir-plugins")
              git -C contrib/tenzir-plugins fetch --no-tags --depth=1 origin "$plugins_base"
              while IFS= read -r file; do
                tenzir_plugins_files+=("contrib/tenzir-plugins/$file")
              done < <(git -C contrib/tenzir-plugins diff --name-only --diff-filter=ACMR "$plugins_base" HEAD)
            fi
          fi
          if [ "${#tenzir_plugins_files[@]}" -gt 0 ]; then
            nix run .#format -- --fail-on-change "${tenzir_plugins_files[@]}"
          fi

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Check
        run: |
          pip install --upgrade ansible ansible-lint
          ansible-galaxy collection install ansible.posix
          ansible-lint --strict --profile production ansible

  ocsf-schemas:
    name: ocsf-schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            ocsf:
              - 'scripts/ocsf-schemas.py'
              - 'schema/types/ocsf/**'
              - 'libtenzir/include/tenzir/ocsf_*.inc'
      - if: steps.changes.outputs.ocsf == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.changes.outputs.ocsf == 'true'
        uses: astral-sh/setup-uv@v5
      - if: steps.changes.outputs.ocsf == 'true'
        name: Check
        run: |
          set -eo pipefail
          uv run --script scripts/ocsf-schemas.py
          git add --intent-to-add --all
          git diff --submodule=diff --exit-code || {
            echo '::error title=ocsf-schemas::Please run `uv run --script scripts/ocsf-schemas.py` and commit the generated changes.'
            git diff --submodule=diff --exit-code
          }

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: hashicorp/setup-terraform@v3
      - name: Check
        run: |
          terraform fmt -check -recursive -diff

  style-check:
    needs:
      - ansible-lint
      - ocsf-schemas
      - terraform-fmt
      - treefmt
    if: always()
    runs-on: ubuntu-latest
    name: Style Check
    steps:
      - name: Failure
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          # This check runs after any other job failed.
          exit 1
      - name: Success
        run: |
          # This check runs after all other jobs are done or skipped.
          exit 0
