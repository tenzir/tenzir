name: Push Manifest
on:
  workflow_call:
    inputs:
      source-images:
        description: 'Space-separated list of source image URLs from build jobs (e.g., "ghcr.io/tenzir/tenzir:main-slim-aarch64 ghcr.io/tenzir/tenzir:main-slim-x86_64")'
        type: string
        required: true
      arch-suffixes:
        description: 'Space-separated list of architecture suffixes to strip for manifest tags (e.g., "aarch64 x86_64")'
        type: string
        required: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  push-manifest:
    name: Push Manifest and Sign
    runs-on: ubuntu-latest
    steps:
      - name: Ensure XDG_RUNTIME_DIR
        run: |
          if [[ -z "$XDG_RUNTIME_DIR" ]]; then
            XDG_RUNTIME_DIR="/run/user/$(id -u)"
            mkdir -p "$XDG_RUNTIME_DIR"
            echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          fi
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Extract registries and login
        id: registries
        run: |
          # Extract unique registries from source images
          registries=$(echo '${{ inputs.source-images }}' | tr ' ' '\n' | sed 's|/.*||' | sort -u | tr '\n' ' ')
          echo "list=$registries" >> "$GITHUB_OUTPUT"
          # Build config for registry-login action
          registries_json=$(echo "$registries" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)
          config=$(jq -cn --argjson regs "$registries_json" '{"editions": [{"image-registries": $regs}]}')
          echo "config=$config" >> "$GITHUB_OUTPUT"
      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          config: ${{ steps.registries.outputs.config }}
          ghcr-token: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
          dockerhub-user: ${{ vars.DOCKERHUB_USER }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e  # v0.4
      - name: Create manifests and sign images
        env:
          COSIGN_PASSWORD: ${{ secrets.CONTAINER_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/signing-key.pem' EXIT
          echo "${{ secrets.CONTAINER_SIGNING_KEY }}" > /tmp/signing-key.pem
          chmod 600 /tmp/signing-key.pem

          read -r -a arch_suffixes <<< '${{ inputs.arch-suffixes }}'
          if [[ "${#arch_suffixes[@]}" -eq 0 ]]; then
            echo "::error No architecture suffixes provided"
            exit 1
          fi
          expected_sources_per_manifest="${#arch_suffixes[@]}"

          read -r -a source_images <<< '${{ inputs.source-images }}'
          if [[ "${#source_images[@]}" -eq 0 ]]; then
            echo "::error No source images provided"
            exit 1
          fi

          # Group source images by their manifest target (image URL without arch suffix)
          declare -A manifest_sources
          declare -A manifest_counts
          declare -A manifest_arches

          for src_image in "${source_images[@]}"; do
            manifest_target=""
            matched_suffix=""
            for arch_suffix in "${arch_suffixes[@]}"; do
              if [[ "$src_image" == *"-$arch_suffix" ]]; then
                manifest_target="${src_image%-${arch_suffix}}"
                matched_suffix="$arch_suffix"
                break
              fi
            done
            if [[ -z "$matched_suffix" ]]; then
              echo "::error Source image '$src_image' does not end with one of the expected suffixes: ${{ inputs.arch-suffixes }}"
              exit 1
            fi
            if [[ " ${manifest_arches[$manifest_target]:-} " == *" $matched_suffix "* ]]; then
              echo "::error Duplicate source image for manifest '$manifest_target' and architecture '$matched_suffix'"
              exit 1
            fi

            # Add to the list of sources for this manifest
            if [[ -n "${manifest_sources[$manifest_target]+set}" ]]; then
              manifest_sources[$manifest_target]="${manifest_sources[$manifest_target]} $src_image"
            else
              manifest_sources[$manifest_target]="$src_image"
            fi
            manifest_counts[$manifest_target]="$(( ${manifest_counts[$manifest_target]:-0} + 1 ))"
            manifest_arches[$manifest_target]="${manifest_arches[$manifest_target]:+${manifest_arches[$manifest_target]} }$matched_suffix"
          done

          # Create each manifest and sign it
          for manifest_target in "${!manifest_sources[@]}"; do
            if [[ "${manifest_counts[$manifest_target]}" -ne "$expected_sources_per_manifest" ]]; then
              echo "::error Manifest '$manifest_target' has ${manifest_counts[$manifest_target]} source image(s), expected $expected_sources_per_manifest (${manifest_arches[$manifest_target]})"
              exit 1
            fi
            sources="${manifest_sources[$manifest_target]}"
            read -r -a source_refs <<< "$sources"
            echo "::notice Creating manifest $manifest_target from: $sources"
            docker buildx imagetools create \
              --tag "$manifest_target" \
              "${source_refs[@]}"
            # Resolve the tag to a digest for signing.
            digest=$(crane digest "$manifest_target")
            # Extract registry/repo from the manifest target (everything before the colon)
            repo="${manifest_target%:*}"
            image_by_digest="${repo}@${digest}"
            # Keyless signing uses GitHub Actions OIDC identity.
            # Verify with:
            #   cosign verify \
            #     --certificate-identity-regexp="https://github.com/tenzir/tenzir/.*" \
            #     --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            #     <image>
            echo "::notice Signing ${image_by_digest} with Cosign (keyless)"
            cosign sign --yes --recursive "${image_by_digest}" || {
              echo "::warning Cosign keyless signing failed for ${image_by_digest}"
              failed=1
            }
            # Sigstore-format signing for Podman automatic verification.
            # Signatures are stored as OCI artifacts directly in the registry.
            # Users configure /etc/containers/policy.json with the public key
            # and set use-sigstore-attachments: true in registries.d.
            echo "::notice Signing ${image_by_digest} with sigstore format for Podman"
            cosign sign --yes --recursive --key /tmp/signing-key.pem "${image_by_digest}" || {
              echo "::warning Sigstore signing failed for ${image_by_digest}"
              failed=1
            }
          done
          if [[ "${failed:-0}" -eq 1 ]]; then
            echo "::error One or more signing operations failed"
            exit 1
          fi
