name: Docker
on:
  workflow_call:
    inputs:
      config:
        type: string
        required: true
      runner:
        type: string
        required: true
      arch:
        type: string
        required: true
    outputs:
      images:
        description: Built image references for this architecture
        value: ${{ jobs.build.outputs.images }}
      benchmark-image:
        description: Benchmark image reference for this architecture
        value: ${{ jobs.build.outputs.benchmark-image }}

permissions:
  actions: write
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: Build (${{ inputs.arch }})
    runs-on: ${{ inputs.runner }}
    outputs:
      images: ${{ steps.push-images.outputs.images }}
      benchmark-image: ${{ steps.push-images.outputs.benchmark-image }}
    steps:
      - name: Prevent pushing protected editions to public repos
        run: |
          # Create 'name registry' pairs
          jq -r '.editions[] | select(."image-registries" | length > 0) | .name as $name | ."image-registries"[]? // ."image-registries" | [ $name, . ] | join(" ")' \
            <<< '${{ inputs.config }}' | while read -r name registry; do
            # Explicitly allow tenzir, demo and dev images.
            [[ "${name}" =~ ^tenzir(|-de|-node|-node-de|-demo)$ ]] && continue
            # Explicitly allow private registries.
            [[ "${registry}" == "622024652768.dkr.ecr.eu-west-1.amazonaws.com" ]] && continue
            echo "::error Pushing ${name} to ${registry} is forbidden"
            exit 1
          done
      - name: Ensure XDG_RUNTIME_DIR
        # This env variable is used by skopeo, but isn't set on ubicloud
        # runners.
        run: |
          if [[ -z "$XDG_RUNTIME_DIR" ]]; then
            XDG_RUNTIME_DIR="/run/user/$(id -u)"
            mkdir -p "$XDG_RUNTIME_DIR"
            echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          fi
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install Nix
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/0d70460758949966e91d9ecb823b821f963cefbb.tar.gz
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          pushFilter: "(tenzir-ee|tenzir-plugins-source)"
      - name: Prepare ccache directory
        run: |
          sudo mkdir -p /tmp/tenzir-ccache
          sudo chmod 1777 /tmp/tenzir-ccache
          sudo rm -f \
            /tmp/tenzir-ccache/remote-only \
            /tmp/tenzir-ccache/s3.sock \
            /tmp/tenzir-ccache/s3-helper.pid
      - name: Configure ccache AWS credentials
        if: vars.CCACHE_S3_BUCKET != '' && vars.CCACHE_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          role-to-assume: ${{ vars.CCACHE_AWS_ROLE_ARN }}
          aws-region: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
      - name: Start ccache S3 helper
        env:
          CCACHE_S3_BUCKET: ${{ vars.CCACHE_S3_BUCKET }}
          CCACHE_S3_PREFIX: ${{ vars.CCACHE_S3_PREFIX || 'ccache' }}
          CCACHE_S3_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
          CCACHE_S3_AUTH: ${{ vars.CCACHE_S3_AUTH }}
          CCACHE_R2_OIDC_BROKER_URL: ${{ vars.CCACHE_R2_OIDC_BROKER_URL }}
          CCACHE_R2_OIDC_AUDIENCE: ${{ vars.CCACHE_R2_OIDC_AUDIENCE || 'ccache-r2-broker' }}
          AWS_ENDPOINT_URL_S3: ${{ vars.CCACHE_S3_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
          AWS_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
        run: |
          if [[ -z "${CCACHE_S3_BUCKET}" ]]; then
            echo "::notice::CCACHE_S3_BUCKET is unset, skipping ccache S3 helper"
            exit 0
          fi
          sudo touch /tmp/tenzir-ccache/remote-only
          sudo chmod 0666 /tmp/tenzir-ccache/remote-only
          nix-shell -p 'python3.withPackages (ps: [ ps.boto3 ])' --run '
            python_bin="$(command -v python3)"
            nohup "$python_bin" scripts/ccache/s3-storage-helper.py \
              --endpoint /tmp/tenzir-ccache/s3.sock \
              --url "s3://${CCACHE_S3_BUCKET}/${CCACHE_S3_PREFIX}" \
              --idle-timeout 0 \
              --socket-mode 0666 \
              >/tmp/ccache-s3-helper.log 2>&1 &
            echo $! | sudo tee /tmp/tenzir-ccache/s3-helper.pid >/dev/null
          '
          helper_pid="$(cat /tmp/tenzir-ccache/s3-helper.pid)"
          for _ in {1..30}; do
            if sudo test -S /tmp/tenzir-ccache/s3.sock; then
              exit 0
            fi
            if ! kill -0 "${helper_pid}" 2>/dev/null; then
              echo "::warning::ccache S3 helper exited before creating its socket; continuing without remote ccache"
              cat /tmp/ccache-s3-helper.log || true
              sudo rm -f /tmp/tenzir-ccache/s3-helper.pid
              exit 0
            fi
            sleep 1
          done
          echo "::warning::ccache S3 helper did not create its socket within 30 seconds; continuing without remote ccache"
          cat /tmp/ccache-s3-helper.log || true
          sudo rm -f /tmp/tenzir-ccache/s3-helper.pid
          exit 0
      - name: Update tenzir-plugins source info
        env:
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          # Prefetch the tenzir-plugins tarball into the Nix store using the
          # gitlink recorded in the superproject. The flake falls back to this
          # tarball because submodule contents are not part of the flake
          # source.
          nix/update-plugins.sh
      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          config: ${{ inputs.config }}
          ghcr-token: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
          dockerhub-user: ${{ vars.DOCKERHUB_USER }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build Tenzir packages
        env:
          TENZIR_VERSION_SUFFIX: ${{ fromJSON(inputs.config).version-suffix }}
        run: |
          nix_flags=(
            --option extra-sandbox-paths "/tmp/tenzir-ccache?"
            # Dynamic Tenzir builds fan out into many plugin derivations. Keep
            # Nix parallelism modest here to avoid GitHub runners getting
            # OOM-killed mid-build.
            --option max-jobs 2
            --option cores 2
            --accept-flake-config
            --print-build-logs
          )
          if [[ -n "${TENZIR_VERSION_SUFFIX}" ]]; then
            nix_flags+=(--impure)
          fi
          # Build each package needed by an edition that gets pushed.
          # The unchecked package is the actual image payload. On amd64 we also
          # build the checked package to run the integration test suite as part
          # of the Docker workflow, matching the old Dockerfile-based
          # validation. On arm64 we skip the checked build here because a
          # third-party restinio test is flaky on GitHub's runner; other CI
          # jobs still cover the codebase on that architecture.
          jq -r '[.editions[] | select(."image-registries" | length > 0) | .package] | unique | .[]' \
            <<< '${{ inputs.config }}' | while read -r package; do
            echo "::group::Build ${package}"
            nix build "${nix_flags[@]}" ".#${package}.unchecked" --no-link
            if [[ '${{ inputs.arch }}' == 'amd64' ]]; then
              nix build "${nix_flags[@]}" ".#${package}" --no-link
            fi
            echo "::endgroup::"
          done
      - name: Push container images
        id: push-images
        env:
          TENZIR_VERSION_SUFFIX: ${{ fromJSON(inputs.config).version-suffix }}
        run: |
          nix_flags=(
            --option extra-sandbox-paths "/tmp/tenzir-ccache?"
            --option max-jobs 2
            --option cores 2
            --accept-flake-config
          )
          if [[ -n "${TENZIR_VERSION_SUFFIX}" ]]; then
            nix_flags+=(--impure)
          fi
          push() {
            local package="$1" image="$2" dest="$3"
            echo "::notice Pushing ${dest}"
            nix run "${nix_flags[@]}" \
              ".#${package}.unchecked.asImage.${image}.copyTo" -- \
              "docker://${dest}"
          }
          images_file="$(mktemp)"
          benchmark_image_file="$(mktemp)"
          trap 'rm -f "$images_file" "$benchmark_image_file"' EXIT
          source_tag='${{ fromJSON(inputs.config).source-tag }}'
          jq -r '.editions[] | .name as $name | .package as $package | .image as $image | ."image-registries"[]? | [ $name, $package, $image, . ] | join(" ")' \
            <<< '${{ inputs.config }}' | while read -r name package image registry; do
            dest="${registry}/tenzir/${name}:${source_tag}-${{ inputs.arch }}"
            push "${package}" "${image}" "${dest}"
            echo "${dest}" >> "$images_file"
            if [[ "${name}" == "tenzir" && "${registry}" == "ghcr.io" && "${{ inputs.arch }}" == "amd64" ]]; then
              benchmark_image="${dest}"
              if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
                benchmark_image="${registry}/tenzir/${name}:${{ github.sha }}-${{ inputs.arch }}"
                push "${package}" "${image}" "${benchmark_image}"
              fi
              echo "${benchmark_image}" > "$benchmark_image_file"
            fi
          done
          echo "images=$(paste -sd' ' "$images_file")" >> "$GITHUB_OUTPUT"
          if [[ -s "$benchmark_image_file" ]]; then
            echo "benchmark-image=$(cat "$benchmark_image_file")" >> "$GITHUB_OUTPUT"
          fi
      - name: Stop ccache storage helpers
        if: always()
        run: |
          if [[ -f /tmp/tenzir-ccache/s3-helper.pid ]]; then
            helper_pid="$(cat /tmp/tenzir-ccache/s3-helper.pid)"
            if [[ "$helper_pid" =~ ^[0-9]+$ ]]; then
              helper_command="$(ps -p "$helper_pid" -o command= 2>/dev/null || true)"
              if grep -Fq 'scripts/ccache/s3-storage-helper.py' <<<"$helper_command"; then
                kill "$helper_pid" || sudo kill "$helper_pid" || true
              fi
            fi
            sudo rm -f /tmp/tenzir-ccache/s3-helper.pid
          fi
      - name: Write benchmark target metadata
        if: inputs.arch == 'amd64'
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark-target"
          cat > "$RUNNER_TEMP/benchmark-target/benchmark-target-docker-amd64.json" <<EOF
          {
            "kind": "docker",
            "target": "docker",
            "arch": "amd64",
            "sha": "${{ github.sha }}",
            "version": "${{ fromJSON(inputs.config).build-version }}",
            "image": "${{ steps.push-images.outputs.benchmark-image }}"
          }
          EOF
      - name: Upload benchmark target metadata
        if: inputs.arch == 'amd64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: benchmark-target-docker-amd64
          path: ${{ runner.temp }}/benchmark-target/benchmark-target-docker-amd64.json
          if-no-files-found: error
