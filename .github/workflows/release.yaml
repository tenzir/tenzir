name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: |
          Version bump type

          Use `auto` to infer from unreleased changelog entries, or when
          promoting the latest outstanding release candidate to stable.
        required: false
        # workflow_dispatch choice inputs cannot represent an unset value.
        # `auto` is the explicit sentinel for "infer bump".
        default: auto
        type: choice
        options:
          - auto
          - minor
          - patch
      rc:
        description: |
          Create or continue the release-candidate series for the resolved
          stable version.
        required: false
        default: false
        type: boolean
      intro:
        description: |
          Intro of the release

          The intro should be 1-2 sentences long, must be written in active
          voice, and should clearly communicate the theme of the release to the
          user. Use full sentences and avoid abbreviations.
        required: true
        type: string
      title:
        description: |
          User-facing release title

          The title should be a short headline that captures the main theme of
          the release. Do not use the version number as the title.
        required: true
        type: string
  workflow_call:
    inputs:
      bump:
        description: Version bump type (auto, minor, patch, or major)
        required: false
        default: auto
        type: string
      rc:
        description: Create or continue the release-candidate series for the resolved stable version
        required: false
        default: false
        type: boolean
      intro:
        description: Intro of the release
        required: true
        type: string
      title:
        description: User-facing release title
        required: true
        type: string

jobs:
  validate-release-config:
    name: Validate release workflow configuration
    runs-on: ubuntu-latest

    steps:
      - name: Validate release configuration
        env:
          TENZIR_GITHUB_APP_ID: ${{ vars.TENZIR_GITHUB_APP_ID }}
          TENZIR_GITHUB_APP_PRIVATE_KEY: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          TENZIR_BOT_GPG_SIGNING_KEY: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}
          RELEASE_TITLE: ${{ inputs.title }}
        run: |
          if [ -z "$TENZIR_GITHUB_APP_ID" ]; then
            echo "::error::Repository variable 'TENZIR_GITHUB_APP_ID' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_GITHUB_APP_PRIVATE_KEY' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_BOT_GPG_SIGNING_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_BOT_GPG_SIGNING_KEY' must be set for release runs."
            exit 1
          fi

          if [ -z "$(printf '%s' "$RELEASE_TITLE" | tr -d '[:space:]')" ]; then
            echo "::error::Release runs must provide a user-facing title. Do not use the version number as the title."
            exit 1
          fi

  release:
    name: Release
    needs: validate-release-config
    uses: tenzir/ship/.github/workflows/release.yaml@87509bbc44fc9dc383816ab5b0706584c21fbd64
    permissions:
      contents: write
    with:
      bump: ${{ inputs.bump }}
      rc: ${{ inputs.rc }}
      intro: ${{ inputs.intro }}
      title: ${{ inputs.title }}
      pre-publish: |
        VERSION_NUMBER="${RELEASE_VERSION#v}"

        # Update tenzir-version in version.json using jq.
        jq --arg version "${VERSION_NUMBER}" '.["tenzir-version"] = $version' version.json > version.json.tmp
        mv version.json.tmp version.json

        # Update package versions.
        for package_dir in tenzir-common tenzir-operator tenzir; do
          uv --directory "python/${package_dir}" version --frozen "${VERSION_NUMBER}"
        done

        # Keep dependency constraints in sync with the new version.
        UPPER_BOUND=$(uvx --from semver pysemver bump minor "${VERSION_NUMBER}")
        uv --directory python add --package tenzir --frozen "tenzir-common>=${VERSION_NUMBER},<${UPPER_BOUND}"
        uv --directory python add --package tenzir-operator --frozen "tenzir-common>=${VERSION_NUMBER},<${UPPER_BOUND}"
        uv --directory python lock

        echo "Updated version.json with tenzir-version: ${VERSION_NUMBER}"
        echo "Updated Python package versions to: ${VERSION_NUMBER}"
      publish-no-latest-on-non-main: true
      copy-release-to-main-on-non-main: true
      update-latest-branch-on-main: true
      github_app_id: ${{ vars.TENZIR_GITHUB_APP_ID }}
      git_user_name: tenzir-bot
      git_user_email: engineering@tenzir.com
      sign_commits: true
      sign_tags: true
    secrets:
      github_app_private_key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
      gpg_private_key: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}

  sbom:
    name: Attach SBOM
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release.outputs.version }}

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM artifact
        run: nix run .#generate-sbom -- /tmp/tenzir.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: gh release upload "$RELEASE_VERSION" /tmp/tenzir.spdx.json --clobber

  # Record this release in Linear's "Tenzir Node" releases view by attaching
  # every Linear issue referenced from the commits since the previous release.
  # The action walks git history from a stored baseline up to HEAD, so it must
  # check out full history (fetch-depth: 0) with HEAD at the release commit.
  #
  # Keep this job last and non-blocking: it only affects Linear's
  # project-tracking view and nothing downstream depends on it, so a
  # Linear/API outage here should not fail a release whose tags and GitHub
  # release are already published.
  #
  # Only run for latest mainline releases. The action advances the stored
  # baseline to HEAD on every `sync`, and that baseline is global (not
  # per-branch). Running it on a backport or RC branch would move the
  # baseline onto that branch's HEAD, so the next mainline release would scan
  # from the wrong point and mis-attach already-released commits.
  linear-release:
    name: Sync Linear Release
    needs: release
    if: needs.release.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.release.outputs.version }}
          fetch-depth: 0

      - name: Create Linear release
        id: linear_release
        continue-on-error: true
        uses: linear/linear-release-action@v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_NODE_RELEASE_API_KEY }}
          version: ${{ needs.release.outputs.version }}
          name: ${{ inputs.title }}

      # The action's docs are ambiguous about whether `sync` always creates a
      # release: it may leave release-id empty in some cases (e.g. when no
      # scanned commits reference a Linear issue). Marking a release complete
      # fails if it does not exist, so guard on release-id and only run this
      # step when the previous one actually created a release.
      - name: Mark Linear release as released
        if: steps.linear_release.outputs.release-id != ''
        continue-on-error: true
        uses: linear/linear-release-action@v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_NODE_RELEASE_API_KEY }}
          command: complete
          version: ${{ needs.release.outputs.version }}
