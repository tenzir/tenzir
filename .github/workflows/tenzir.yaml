name: Tenzir
on:
  workflow_dispatch:
    inputs:
      tenzir-static-aarch64-linux:
        description: Run the `tenzir-static-aarch64-linux` job.
        type: boolean
        default: false
      tenzir-static-x86_64-linux:
        description: Run the `tenzir-static-x86_64-linux` job.
        type: boolean
        default: false
      tenzir-static-arm64-darwin:
        description: Run the `tenzir-static-arm64-darwin` job.
        type: boolean
        default: false
      docker-slim:
        description: Run the `docker-slim` job.
        type: boolean
        default: false
      benchmark-reference-static:
        description: Run the `benchmark-reference-static` job.
        type: boolean
        default: false
      python:
        description: Run the `python` job.
        type: boolean
        default: false
      python-package:
        description: Run the `python-package` job.
        type: boolean
        default: false
      update-homebrew-tap:
        description: Run the `update-homebrew-tap` job.
        type: boolean
        default: false
  push:
    branches:
      - main
      - v*
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    types:
      - checks_requested
  release:
    types:
      - published

# This section defines how the Tenzir action is enqueued.
concurrency:
  # Wait for in-progress runs of this action for the same branch to finish
  # before starting, ensuring that a branch is only built once at a time. This
  # has a double-purpose: It ensures that caches are always able to pick up work
  # from previous builds of the same branch, and it rate-limits the CI to ensure
  # it's running smoothly for all users.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel all in-progress runs of this action for the same pull request.
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CCACHE_MAXSIZE: "5G"
  GCP_WORKLOAD_IDP: projects/1057156539039/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider
  GCP_SERVICE_ACCOUNT: github-actions@crucial-kayak-261816.iam.gserviceaccount.com

# TODO: cherry-pick permissions
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  configure:
    name: Configure
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.configure.outputs.build-version }}
      release-version: ${{ steps.configure.outputs.release-version }}
      ref-slug: ${{ steps.configure.outputs.ref-slug }}
      head-ref-slug: ${{ steps.configure.outputs.head-ref-slug }}
      base-ref-slug: ${{ steps.configure.outputs.base-ref-slug }}
      tenzir-version-suffix: ${{ steps.configure.outputs.tenzir-version-suffix }}
      tenzir-version-build-metadata: ${{ steps.configure.outputs.tenzir-version-build-metadata }}
      run-tenzir-nix: ${{ steps.configure.outputs.run-tenzir-nix }}
      run-python: ${{ steps.configure.outputs.run-python }}
      run-python-package: ${{ steps.configure.outputs.run-python-package }}
      run-tenzir-static-aarch64-linux: ${{ steps.select-jobs.outputs.run-tenzir-static-aarch64-linux }}
      run-tenzir-static-x86_64-linux: ${{ steps.select-jobs.outputs.run-tenzir-static-x86_64-linux }}
      run-tenzir-static-arm64-darwin: ${{ steps.select-jobs.outputs.run-tenzir-static-arm64-darwin }}
      run-docker-slim: ${{ steps.select-jobs.outputs.run-docker-slim }}
      run-benchmark-reference-static: ${{ steps.select-jobs.outputs.run-benchmark-reference-static }}
      run-update-homebrew-tap: ${{ steps.select-jobs.outputs.run-update-homebrew-tap }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 2
      - name: Fetch to merge-base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-recurse-submodules origin main
          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch origin $(git merge-base "origin/$base_ref" HEAD)
      - name: Fetch Tags
        run: git fetch origin +refs/tags/*:refs/tags/*
      - name: Inject Slug Variables
        uses: rlespinasse/github-slug-action@v5
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDP }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - name: Configure GCloud Credentials
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure
        id: configure
        env:
          WORKFLOW_DISPATCH_INPUTS: ${{ toJSON(inputs) }}
        run: |
          # Set a bunch of version numbers depending on how we triggered the PR
          # so they're consistent between jobs.
          version="v$(jq -r '."tenzir-version"' version.json)"
          id_sha="${{ github.sha }}"
          release_version="${version}"
          build_version="${version}+g${id_sha:0:10}"

          echo "build-version=${build_version}" >> $GITHUB_OUTPUT
          echo "release-version=${release_version}" >> $GITHUB_OUTPUT
          # Inject the branch slugs for cache names.
          echo "ref-slug=${GITHUB_REF_SLUG}" >> $GITHUB_OUTPUT
          echo "head-ref-slug=${GITHUB_HEAD_REF_SLUG}" >> $GITHUB_OUTPUT
          echo "base-ref-slug=${GITHUB_BASE_REF_SLUG}" >> $GITHUB_OUTPUT
          tenzir_version_suffix=""
          tenzir_version_build_metadata="g${id_sha:0:10}"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            tenzir_version_suffix="pr${{ github.event.number }}"
          fi
          echo "tenzir-version-suffix=${tenzir_version_suffix}" >> $GITHUB_OUTPUT
          echo "tenzir-version-build-metadata=${tenzir_version_build_metadata}" >> $GITHUB_OUTPUT
          #################################
          ######## Decide what jobs to run.
          #################################
          # TODO: Split this into two steps:
          # * Set version variables (above)
          # * Enable Jobs (below)
          echo "::notice Disable all others so we can selectively enable again"
          echo "run-python=false" >> $GITHUB_OUTPUT
          echo "run-python-package=false" >> $GITHUB_OUTPUT
          echo "run-tenzir-nix=false" >> $GITHUB_OUTPUT
          # A little helper to enable all checks.
          shopt -s expand_aliases
          alias run_all_checks=' \
            echo "run-python=true" >> $GITHUB_OUTPUT; \
            echo "run-tenzir-nix=true" >> $GITHUB_OUTPUT;'
          # Run all if this is a release.
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            echo "::notice Enabling release jobs"
            run_all_checks
            echo "run-python-package=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Run all checks if this is a push to master or a tag.
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "::notice Enabling push jobs"
            run_all_checks
            exit 0
          fi
          # Run only what is requested for a workflow dispatch.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice Enabling workflow dispatch job groups"
            input_enabled() {
              local name="$1"
              jq -e --arg name "$name" '.[$name] == true or .[$name] == "true"' \
                <<< "$WORKFLOW_DISPATCH_INPUTS" >/dev/null
            }
            if input_enabled tenzir-static-aarch64-linux ||
               input_enabled tenzir-static-x86_64-linux ||
               input_enabled tenzir-static-arm64-darwin ||
               input_enabled docker-slim ||
               input_enabled benchmark-reference-static ||
               input_enabled python ||
               input_enabled python-package ||
               input_enabled update-homebrew-tap; then
              echo "run-tenzir-nix=true" >> $GITHUB_OUTPUT
            fi
            if input_enabled python; then
              echo "run-python=true" >> $GITHUB_OUTPUT
            fi
            if input_enabled python-package; then
              echo "run-python-package=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          # From here on we should be in a pull request.
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            echo "::error::Unexpected GitHub Event: $GITHUB_EVENT_NAME"
            exit 1
          fi
          echo "::notice Enabling pull request jobs"
          echo "::notice sourcing configure helpers"
          # Set the comparison point for detecting changes in pull requests
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_ref="${GITHUB_BASE_REF:-main}"
            before_sha=$(git merge-base "origin/$base_ref" HEAD)
            export before_sha
          fi
          source ./.github/workflows/configure_helpers.bash
          # Run all checks if this file changed.
          if is_changed .github/workflows/tenzir.yaml; then
            run_all_checks
            exit 0
          fi
          run_if_changed python "python/"
          TENZIR_SOURCES=(cmake/ CMakeLists.txt contrib/tenzir-plugins/ libtenzir/ libtenzir_test/ schema/ tenzir/ tenzir.yaml.example version.json plugins/)
          run_if_changed_default tenzir-nix $run_python \
            "${TENZIR_SOURCES[@]}" plugins/ contrib/tenzir-plugins/ flake.nix flake.lock nix/ \
            ".github/workflows/nix.nu" \
            ".github/workflows/nix.yaml" \
            ".github/workflows/nix-config-base.json"
      - name: Select Jobs
        id: select-jobs
        env:
          WORKFLOW_DISPATCH_INPUTS: ${{ toJSON(inputs) }}
          RUN_TENZIR_NIX: ${{ steps.configure.outputs.run-tenzir-nix }}
          RUN_PYTHON: ${{ steps.configure.outputs.run-python }}
          RUN_PYTHON_PACKAGE: ${{ steps.configure.outputs.run-python-package }}
        run: |
          set_output() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          input_enabled() {
            local name="$1"
            jq -e --arg name "$name" '.[$name] == true or .[$name] == "true"' \
              <<< "$WORKFLOW_DISPATCH_INPUTS" >/dev/null
          }

          enable_job() {
            local job="$1"
            case "$job" in
              tenzir-static-aarch64-linux)
                set_output run-tenzir-static-aarch64-linux true
                ;;
              tenzir-static-x86_64-linux)
                set_output run-tenzir-static-x86_64-linux true
                ;;
              tenzir-static-arm64-darwin)
                set_output run-tenzir-static-arm64-darwin true
                ;;
              docker-slim)
                enable_job tenzir-static-aarch64-linux
                enable_job tenzir-static-x86_64-linux
                set_output run-docker-slim true
                ;;
              benchmark-reference-static)
                enable_job tenzir-static-x86_64-linux
                set_output run-benchmark-reference-static true
                ;;
              python)
                enable_job tenzir-static-x86_64-linux
                set_output run-python true
                ;;
              python-package)
                enable_job tenzir-static-arm64-darwin
                enable_job tenzir-static-aarch64-linux
                enable_job tenzir-static-x86_64-linux
                set_output run-python-package true
                ;;
              update-homebrew-tap)
                enable_job tenzir-static-arm64-darwin
                set_output run-update-homebrew-tap true
                ;;
              *)
                echo "::error::Unknown workflow dispatch job selection: $job"
                exit 1
                ;;
            esac
          }

          for key in \
            run-tenzir-static-aarch64-linux \
            run-tenzir-static-x86_64-linux \
            run-tenzir-static-arm64-darwin \
            run-docker-slim \
            run-benchmark-reference-static \
            run-python \
            run-python-package \
            run-update-homebrew-tap; do
            set_output "$key" false
          done

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            for job in \
              tenzir-static-aarch64-linux \
              tenzir-static-x86_64-linux \
              tenzir-static-arm64-darwin \
              docker-slim \
              benchmark-reference-static \
              python \
              python-package \
              update-homebrew-tap; do
              if input_enabled "$job"; then
                enable_job "$job"
              fi
            done
            exit 0
          fi

          if [[ "$RUN_TENZIR_NIX" == "true" ]]; then
            set_output run-tenzir-static-aarch64-linux true
            set_output run-tenzir-static-x86_64-linux true
            set_output run-docker-slim true
          fi

          if [[ "$RUN_TENZIR_NIX" == "true" ]]; then
            if [[ "$GITHUB_REF" == "refs/heads/main" ]] || [[ "$GITHUB_EVENT_NAME" == "release" && "$GITHUB_REF_NAME" != *-rc* ]]; then
              set_output run-benchmark-reference-static true
            fi
          fi

          if [[ "$RUN_PYTHON" == "true" ]]; then
            set_output run-python true
          fi
          if [[ "$RUN_PYTHON_PACKAGE" == "true" ]]; then
            set_output run-tenzir-static-arm64-darwin true
            set_output run-python-package true
          fi
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            set_output run-update-homebrew-tap true
          fi

  tenzir-static-aarch64-linux:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-static-aarch64-linux == 'true'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: ubicloud-standard-4-arm
      os: linux
      arch: aarch64
      attribute: tenzir-static
      build-version: ${{ needs.configure.outputs.build-version }}
      version-suffix: ${{ needs.configure.outputs.tenzir-version-suffix }}
      version-build-metadata: ${{ needs.configure.outputs.tenzir-version-build-metadata }}
    secrets: inherit

  tenzir-static-x86_64-linux:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-static-x86_64-linux == 'true'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: ubuntu-latest
      os: linux
      arch: x86_64
      attribute: tenzir-static
      build-version: ${{ needs.configure.outputs.build-version }}
      version-suffix: ${{ needs.configure.outputs.tenzir-version-suffix }}
      version-build-metadata: ${{ needs.configure.outputs.tenzir-version-build-metadata }}
    secrets: inherit

  tenzir-static-arm64-darwin:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-static-arm64-darwin == 'true'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: macos-26
      os: darwin
      arch: arm64
      attribute: tenzir-static
      build-version: ${{ needs.configure.outputs.build-version }}
      version-suffix: ${{ needs.configure.outputs.tenzir-version-suffix }}
      version-build-metadata: ${{ needs.configure.outputs.tenzir-version-build-metadata }}
      notarize_macos: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  docker-slim:
    name: Push tenzir-slim docker manifest
    needs: [configure, tenzir-static-aarch64-linux, tenzir-static-x86_64-linux]
    if: needs.configure.outputs.run-docker-slim == 'true'
    uses: ./.github/workflows/push-manifest.yaml
    with:
      source-images: "${{ needs.tenzir-static-aarch64-linux.outputs.images }} ${{ needs.tenzir-static-x86_64-linux.outputs.images }}"
      arch-suffixes: "aarch64 x86_64"
    secrets: inherit

  benchmark-reference-static:
    name: Benchmark reference (static)
    needs:
      - configure
      - tenzir-static-x86_64-linux
    if: needs.configure.outputs.run-benchmark-reference-static == 'true'
    runs-on: ubuntu-latest
    env:
      BENCHMARK_AWS_ROLE_ARN: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      BENCHMARK_S3_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
      BENCHMARK_S3_PREFIX: ${{ vars.BENCHMARK_S3_PREFIX }}
      TENZIR_BENCH_RUNNER_CLASS: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download static benchmark artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tenzir-static-x86_64-linux
          path: ${{ runner.temp }}/static-artifact
      - name: Benchmark the static binary
        uses: ./.github/actions/benchmark
        with:
          target: ${{ runner.temp }}/static-artifact
          publish-results: true
          destination-prefix: >-
            ${{ github.ref_type == 'tag'
                && format('refs/tags/{0}/static', github.ref_name)
                || format('refs/main/{0}/static', github.sha) }}

  python:
    needs:
      - configure
      - tenzir-static-x86_64-linux
    if: ${{ needs.configure.outputs.run-python == 'true' }}
    name: Python
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    env:
      DEBIAN_FRONTEND: noninteractive
      TENZIR_VERSION_SUFFIX: ${{ needs.configure.outputs.tenzir-version-suffix }}
      TENZIR_VERSION_BUILD_METADATA: ${{ needs.configure.outputs.tenzir-version-build-metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: "0.9.2"
          python-version: ${{ matrix.python-version }}
      - name: Install Nix (for static binaries)
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          pushFilter: "(tenzir-ee|tenzir-plugins-source)"
      - name: Install workspace dependencies
        working-directory: python
        run: |
          uv sync --all-packages --group dev
      - name: Run unit tests
        working-directory: python
        run: |
          uv run --all-packages --group dev pytest
      - name: Build package
        working-directory: python
        run: |
          uv build --wheel --all-packages
      - name: Run integration tests
        working-directory: python
        run: |
          uv venv "${RUNNER_TEMP}/tenzir-python-integration"
          uv pip install \
            --python "${RUNNER_TEMP}/tenzir-python-integration/bin/python" \
            "pytest>=9.0.3,<10.0" \
            "pytest-asyncio>=1.3.0,<2.0.0" \
            dist/*.whl
          export PATH="${RUNNER_TEMP}/tenzir-python-integration/bin:${PATH}"
          TENZIR_PYTHON_INTEGRATION=1 \
            "${RUNNER_TEMP}/tenzir-python-integration/bin/python" \
            -m pytest

  python-package:
    needs:
      - configure
      - tenzir-static-arm64-darwin
      - tenzir-static-aarch64-linux
      - tenzir-static-x86_64-linux
    if: ${{ needs.configure.outputs.run-python-package == 'true' }}
    name: Python Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: ["macos-26", "ubuntu-latest", "ubicloud-standard-4-arm"]
    env:
      DEBIAN_FRONTEND: noninteractive
      TENZIR_VERSION_SUFFIX: ${{ needs.configure.outputs.tenzir-version-suffix }}
      TENZIR_VERSION_BUILD_METADATA: ${{ needs.configure.outputs.tenzir-version-build-metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: "0.9.2"
          python-version: ${{ matrix.python-version }}
      - name: Install Nix (for static binaries)
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          pushFilter: "(tenzir-ee|tenzir-plugins-source)"
      - name: Download signed tarball (macOS)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: tenzir-signed-tarball-arm64-darwin
          path: ${{ runner.temp }}/signed-tarball
      - name: Set signed tarball path (macOS)
        if: runner.os == 'macOS'
        run: |
          TARBALL_PATH="$(ls ${{ runner.temp }}/signed-tarball/*.tar.gz)"
          echo "TENZIR_SIGNED_TARBALL_PATH=$TARBALL_PATH" >> "$GITHUB_ENV"
      - name: Build sdist
        working-directory: python
        run: |
          uv build --sdist --package tenzir-common
          uv build --sdist --package tenzir
      - name: Build wheel for validation
        working-directory: python
        run: |
          uv build --wheel --package tenzir-common
          uv build --wheel --package tenzir
      - name: Validate installed wheel exposes working tenzir binary
        working-directory: python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          tenzir version
      - name: Remove platform independent duplicate packages
        if: ${{ ! ( runner.os == 'Linux' && runner.arch == 'X64') }}
        working-directory: python
        run: |
          rm -f dist/*.tar.gz
          rm -f dist/tenzir-common*.whl
      - name: Publish to PyPI
        if: github.event_name == 'release'
        working-directory: python
        run: |
          uv publish --token "${{ secrets.PYPI_TOKEN }}" dist/*
      - name: Publish to Test PyPI
        if: github.event_name != 'release'
        working-directory: python
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ --token "${{ secrets.TEST_PYPI_TOKEN }}" dist/*

  update-homebrew-tap:
    needs:
      - configure
      - tenzir-static-arm64-darwin
    if: needs.configure.outputs.run-update-homebrew-tap == 'true'
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download signed package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: tenzir-signed-pkg-arm64-darwin
          path: ${{ runner.temp }}/signed-pkg
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          repositories: homebrew-tenzir
      - name: Prepare tap update
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || needs.configure.outputs.release-version }}
        run: |
          pkg_path="$(ls "${{ runner.temp }}/signed-pkg/"*.pkg)"
          sha256="$(shasum -a 256 "$pkg_path" | awk '{print $1}')"
          version="${RELEASE_TAG#v}"
          pkgutil_identifier="$(python3 .github/workflows/nix-build.py print-pkgutil-identifier)"
          {
            echo "HOMEBREW_TAP_SHA256=$sha256"
            echo "HOMEBREW_TAP_VERSION=$version"
            echo "HOMEBREW_TAP_DIR=${{ runner.temp }}/homebrew-tenzir"
            echo "HOMEBREW_TAP_REPO=tenzir/homebrew-tenzir"
            echo "HOMEBREW_PKGUTIL_IDENTIFIER=$pkgutil_identifier"
          } >> "$GITHUB_ENV"

      - name: Clone tap repo
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TAP_REPO: ${{ env.HOMEBREW_TAP_REPO }}
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
        run: |
          git config --global user.name "tenzir-bot"
          git config --global user.email "engineering@tenzir.com"
          git clone "https://x-access-token:${APP_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"

      - name: Render Homebrew cask
        env:
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
          VERSION: ${{ env.HOMEBREW_TAP_VERSION }}
          SHA256: ${{ env.HOMEBREW_TAP_SHA256 }}
          PKGUTIL_IDENTIFIER: ${{ env.HOMEBREW_PKGUTIL_IDENTIFIER }}
        run: |
          python3 scripts/update-homebrew-cask.py \
            --cask "$TAP_DIR/Casks/tenzir.rb" \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --pkgutil-identifier "$PKGUTIL_IDENTIFIER"

      - name: Commit tap update
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || needs.configure.outputs.release-version }}
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
        run: |
          if git -C "$TAP_DIR" diff --quiet -- Casks/tenzir.rb; then
            echo "Homebrew cask is already up to date"
            exit 0
          fi

          git -C "$TAP_DIR" add Casks/tenzir.rb
          git -C "$TAP_DIR" commit -m "Update tenzir cask to ${RELEASE_TAG}"
          git -C "$TAP_DIR" push origin HEAD

  pass-branch-protections:
    needs:
      - configure
      - python
      - python-package
      - update-homebrew-tap
      - tenzir-static-arm64-darwin
      - tenzir-static-aarch64-linux
      - tenzir-static-x86_64-linux
    if: always() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Pass Branch Protections
    steps:
      - name: Failure
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          # This check runs after any other job failed.
          exit 1
      - name: Success
        run: |
          # This check runs after all other jobs are done or skipped
          exit 0
