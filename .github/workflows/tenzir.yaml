name: Tenzir
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - v*
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    types:
      - checks_requested
  release:
    types:
      - published

# This section defines how the Tenzir action is enqueued.
concurrency:
  # Wait for in-progress runs of this action for the same branch to finish
  # before starting, ensuring that a branch is only built once at a time. This
  # has a double-purpose: It ensures that caches are always able to pick up work
  # from previous builds of the same branch, and it rate-limits the CI to ensure
  # it's running smoothly for all users.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel all in-progress runs of this action for the same pull request.
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  CCACHE_MAXSIZE: "5G"
  GCP_WORKLOAD_IDP: projects/1057156539039/locations/global/workloadIdentityPools/gh-actions-pool/providers/gh-actions-provider
  GCP_SERVICE_ACCOUNT: github-actions@crucial-kayak-261816.iam.gserviceaccount.com

# TODO: cherry-pick permissions
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  configure:
    name: Configure
    runs-on: ubuntu-latest
    outputs:
      version-matrix: ${{ steps.configure.outputs.version-matrix }}
      build-version: ${{ steps.configure.outputs.build-version }}
      release-version: ${{ steps.configure.outputs.release-version }}
      ref-slug: ${{ steps.configure.outputs.ref-slug }}
      head-ref-slug: ${{ steps.configure.outputs.head-ref-slug }}
      base-ref-slug: ${{ steps.configure.outputs.base-ref-slug }}
      tenzir-container-ref: ${{ steps.configure.outputs.tenzir-container-ref }}
      tenzir-version-build-metadata: ${{ steps.configure.outputs.tenzir-version-build-metadata }}
      run-docker-tenzir: ${{ steps.configure.outputs.run-docker-tenzir }}
      docker-config: ${{ steps.docker.outputs.docker-config }}
      run-regression-tests: ${{ steps.configure.outputs.run-regression-tests }}
      run-tenzir-nix: ${{ steps.configure.outputs.run-tenzir-nix }}
      run-tenzir: ${{ steps.configure.outputs.run-tenzir }}
      run-python: ${{ steps.configure.outputs.run-python }}
      run-python-package: ${{ steps.configure.outputs.run-python-package }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 2
      - name: Fetch to merge-base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-recurse-submodules origin main
          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch origin $(git merge-base "origin/$base_ref" HEAD)
      - name: Fetch Tags
        run: git fetch origin +refs/tags/*:refs/tags/*
      - name: Inject Slug Variables
        uses: rlespinasse/github-slug-action@v5
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDP }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - name: Configure GCloud Credentials
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure
        id: configure
        run: |
          # Set a bunch of version numbers depending on how we triggered the PR
          # so they're consistent between jobs.
          version="v$(jq -r '."tenzir-version"' version.json)"
          id_sha="${{ github.sha }}"
          release_version="${version}"
          build_version="${version}+g${id_sha:0:10}"

          # Create a matrix with Tenzir versions greater or equal than
          # limit_version. We derive limit_version from the current release by
          # going back 5 minor versions.
          major_minor_patch="${version#v}"
          major="${major_minor_patch%%.*}"
          minor_patch="${major_minor_patch#*.}"
          minor="${minor_patch%%.*}"
          limit_minor=$((minor - 5))
          if ((limit_minor < 0)); then
            limit_minor=0
          fi
          limit_version="v${major}.${limit_minor}.0"
          if git rev-parse "${limit_version}" -- >/dev/null 2>&1; then
            dated_versions=$(git for-each-ref --format="%(creatordate:format:%s)#%(refname:short)" "refs/tags/v[1-9]*" | grep -v '\-rc[0-9]\+$')
            dated_limit_version=$(printf "%s\n" "$dated_versions" | awk -F# -v version="$limit_version" '$2==version{print; exit}')
            # We filter out versions older than limit_version and known bad
            # versions that should not run in regression tests.
            known_bad_versions=(
              "v5.27.3"
              "v5.29.3"
            )
            filtered_versions=$(printf "%s\n" "$dated_versions" | awk -F# -v limit="$dated_limit_version" '$0>=limit{print$2}')
            for bad_version in "${known_bad_versions[@]}"; do
              filtered_versions=$(printf "%s\n" "$filtered_versions" | grep -Fvx "$bad_version" || true)
            done
            version_matrix="$(printf "%s\n" "$filtered_versions" latest | sed '/^$/d' | jq -R | jq -sc 'map({version: .})')"
          else
            # If the computed limit does not exist (e.g., because of an
            # intentional break), only check latest.
            version_matrix="$(printf "latest\n" | jq -R | jq -sc 'map({version: .})')"
          fi
          echo "version-matrix=${version_matrix}" >> $GITHUB_OUTPUT
          echo "build-version=${build_version}" >> $GITHUB_OUTPUT
          echo "release-version=${release_version}" >> $GITHUB_OUTPUT
          # Inject the branch slugs for cache names.
          echo "ref-slug=${GITHUB_REF_SLUG}" >> $GITHUB_OUTPUT
          echo "head-ref-slug=${GITHUB_HEAD_REF_SLUG}" >> $GITHUB_OUTPUT
          echo "base-ref-slug=${GITHUB_BASE_REF_SLUG}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            tenzir_version_build_metadata=""
            tenzir_docker_version_build_metadata=""
          else
            tenzir_version_build_metadata="g${id_sha:0:10}"
            tenzir_docker_version_build_metadata="${tenzir_version_build_metadata}"
            # In Pull Requests we replace the normal commit hash based version
            # suffix with the PR number. That way we get stable arguments to
            # `docker build`, which is needed for layer caching to work.
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              tenzir_docker_version_build_metadata="pr${{ github.event.number }}"
            fi
          fi
          echo "tenzir-version-build-metadata=${tenzir_version_build_metadata}" >> $GITHUB_OUTPUT
          echo "tenzir-docker-version-build-metadata=${tenzir_docker_version_build_metadata}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            tenzir_container_ref="${GITHUB_HEAD_REF_SLUG}"
          else
            tenzir_container_ref="${{ github.sha }}"
          fi
          echo "tenzir-container-ref=${tenzir_container_ref}" >> $GITHUB_OUTPUT
          #################################
          ######## Decide what jobs to run.
          #################################
          # TODO: Split this into two steps:
          # * Set version variables (above)
          # * Enable Jobs (below)
          echo "::notice Disable all others so we can selectivly enable again"
          echo "run-regression-tests=false" >> $GITHUB_OUTPUT
          echo "run-python=false" >> $GITHUB_OUTPUT
          echo "run-python-package=false" >> $GITHUB_OUTPUT
          echo "run-docker-tenzir=false" >> $GITHUB_OUTPUT
          echo "run-tenzir-nix=false" >> $GITHUB_OUTPUT
          echo "run-tenzir=false" >> $GITHUB_OUTPUT
          # A little helper to enable all checks.
          shopt -s expand_aliases
          alias run_all_checks=' \
            echo "run-regression-tests=true" >> $GITHUB_OUTPUT; \
            echo "run-python=true" >> $GITHUB_OUTPUT; \
            echo "run-docker-tenzir=true" >> $GITHUB_OUTPUT; \
            echo "run-tenzir-nix=true" >> $GITHUB_OUTPUT; \
            echo "run-tenzir=true" >> $GITHUB_OUTPUT;'
          # Run all if this is a release.
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            echo "::notice Enabling release jobs"
            run_all_checks
            echo "run-python-package=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Run all checks if this is a push to master or a tag.
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "::notice Enabling push jobs"
            run_all_checks
            exit 0
          fi
          # Run only what is requested for a workflow dispatch.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice Enabling workflow dispatch jobs (macOS nix package)"
            echo "run-tenzir-nix=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # From here on we should be in a pull request.
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            echo "::error::Unexpected GitHub Event: $GITHUB_EVENT_NAME"
            exit 1
          fi
          echo "::notice Enabling pull request jobs"
          echo "::notice sourcing configure helpers"
          # Set the comparison point for detecting changes in pull requests
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_ref="${GITHUB_BASE_REF:-main}"
            before_sha=$(git merge-base "origin/$base_ref" HEAD)
            export before_sha
          fi
          source ./.github/workflows/configure_helpers.bash
          # Run all checks if this file changed.
          if is_changed .github/workflows/tenzir.yaml; then
            run_all_checks
            exit 0
          fi
          run_if_changed python "python/"
          TENZIR_SOURCES=(cmake/ CMakeLists.txt contrib/tenzir-plugins/ libtenzir/ libtenzir_test/ schema/ tenzir/ tenzir.yaml.example version.json plugins/)
          run_if_changed tenzir "${TENZIR_SOURCES[@]}"
          run_docker_tenzir="$(any ${run_tenzir} ${run_python})"
          run_if_changed_default docker-tenzir $run_docker_tenzir \
            "Dockerfile" ".dockerignore" \
            "scripts/debian/build-*.sh" \
            "scripts/debian/install-dev-dependencies.sh" \
            ".github/workflows/docker.yaml" \
            ".github/workflows/push-manifest.yaml" \
            ".github/workflows/docker-config-base.json"
          run_if_changed_default regression-tests $run_docker_tenzir
          run_if_changed tenzir-nix \
            "${TENZIR_SOURCES[@]}" plugins/ contrib/tenzir-plugins/ flake.nix flake.lock nix/ \
            ".github/workflows/nix.nu" \
            ".github/workflows/nix.yaml" \
            ".github/workflows/nix-config-base.json"
      - name: Configure Docker
        id: docker
        if: steps.configure.outputs.run-docker-tenzir == 'true'
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            source_tag="${{ steps.configure.outputs.head-ref-slug }}"
            tags=("${{ steps.configure.outputs.head-ref-slug }}")
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            source_tag="${{ github.sha }}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              tags=('main' "${{ github.sha }}")
            else
              tags=("${{ steps.configure.outputs.ref-slug }}" "${{ github.sha }}")
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            source_tag="${{ github.sha }}"
            major_minor_patch='${{ steps.configure.outputs.release-version }}'
            major_minor=$(echo $major_minor_patch | sed 's/\(v[0-9]*\.[0-9]*\)\..*/\1/')
            major=$(echo $major_minor_patch | sed 's/\(v[0-9]*\)\..*/\1/')
            tags=('latest' "${{ github.sha }}" "${major_minor_patch}" "${major_minor}" "${major}")
          else
            echo "::error::unexpected github.event_name: \"${GITHUB_EVENT_NAME}\""
            exit 1
          fi
          docker_config="$(jq -c \
            '."version-build-metadata" = $vs | ."source-tag" = $source | ."tags" = $ARGS.positional' \
            .github/workflows/docker-config-base.json \
            --arg vs "${{ steps.configure.outputs.tenzir-docker-version-build-metadata }}" \
            --arg source "${source_tag}" \
            --args -- "${tags[@]}")"
          # PRs only publish the community images to GHCR.
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            docker_config="$(jq -c '(.editions[] | ."image-registries") |= [] |
              (.editions[] | select(.name == "tenzir" or .name == "tenzir-node") |
              ."image-registries") |= ["ghcr.io"]' \
              <<< "${docker_config}")"
          # Release builds additionally publish the Docker Hub community images.
          elif [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            docker_config="$(jq -c '
              (.editions[]
               | select(.name == "tenzir" or .name == "tenzir-node")
               | ."image-registries") += ["docker.io"] |
              (.editions[] | ."image-registries") |= unique' \
              <<< "${docker_config}")"
          fi
          echo "docker-config=${docker_config}" >> "$GITHUB_OUTPUT"
          echo "::notice docker-config = ${docker_config}"

  policy-enforcement:
    name: Policy Enforcement
    needs:
      - configure
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Configure ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}
      - name: Require contrib/tenzir-plugins to be downstream of current `main`
        run: |
          git submodule update --init contrib/tenzir-plugins
          git -C contrib/tenzir-plugins fetch origin main
          # Check that the plugins submodule commit is either already merged
          # into `main` or descends from current `main`.
          git -C contrib/tenzir-plugins merge-base --is-ancestor \
            $(git -C contrib/tenzir-plugins rev-parse origin/main) \
            $(git -C contrib/tenzir-plugins rev-parse HEAD) || \
          git -C contrib/tenzir-plugins merge-base --is-ancestor \
            $(git -C contrib/tenzir-plugins rev-parse HEAD) \
            $(git -C contrib/tenzir-plugins rev-parse origin/main)
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_AUTOBUMPER_APP_ID }}
          private-key: ${{ secrets.TENZIR_AUTOBUMPER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Require an open non-draft PR for a submodule bump
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          # Skip check for automated submodule bumps
          commit_author=$(git log -1 --format='%an')
          commit_subject=$(git log -1 --format='%s')
          if [[ "$commit_author" == "tenzir-bot" && "$commit_subject" == "Bump submodule from"* ]]; then
            echo "Skipping policy check for automated bump"
            exit 0
          fi

          if [[ "$GITHUB_EVENT_NAME" != "pull_request" && "$GITHUB_EVENT_NAME" != "merge_group" ]]; then
            echo "Skipping submodule bump PR check for event $GITHUB_EVENT_NAME"
            exit 0
          fi

          git fetch --no-recurse-submodules origin main
          merge_base=$(git merge-base origin/main HEAD)
          if git diff --quiet "$merge_base" HEAD -- contrib/tenzir-plugins; then
            echo "Skipping policy check because contrib/tenzir-plugins was not changed"
            exit 0
          fi

          # Read the gitlink recorded in the superproject instead of relying on
          # the submodule being initialized as a nested Git checkout.
          plugins_sha=$(git rev-parse HEAD:contrib/tenzir-plugins)
          plugins_main_sha=$(gh api repos/tenzir/tenzir-plugins/commits/main --jq .sha)

          if [[ "$plugins_sha" != "$plugins_main_sha" ]]; then
            pr_number=$(gh pr --repo tenzir/tenzir-plugins list --draft=false \
              --search "$plugins_sha" --json number -q ".[0].number")
            [[ -n "$pr_number" ]] # Assert the pr number was non-empty
          fi

  docker-tenzir-amd64:
    name: Docker
    needs:
      - configure
    if: needs.configure.outputs.run-docker-tenzir == 'true'
    uses: ./.github/workflows/docker.yaml
    with:
      config: ${{ needs.configure.outputs.docker-config }}
      runner: ubuntu-latest
      arch: amd64
    secrets: inherit

  docker-tenzir-arm64:
    name: Docker
    needs:
      - configure
    if: needs.configure.outputs.run-docker-tenzir == 'true'
    uses: ./.github/workflows/docker.yaml
    with:
      config: ${{ needs.configure.outputs.docker-config }}
      runner: ubicloud-standard-8-arm
      arch: arm64
    secrets: inherit

  docker-tenzir:
    name: Push Docker Manifest
    needs:
      - configure
      - docker-tenzir-amd64
      - docker-tenzir-arm64
    if: needs.configure.outputs.run-docker-tenzir == 'true'
    uses: ./.github/workflows/push-manifest.yaml
    with:
      source-images: "${{ needs.docker-tenzir-amd64.outputs.images }} ${{ needs.docker-tenzir-arm64.outputs.images }}"
      arch-suffixes: "amd64 arm64"
      tags: "${{ join(fromJSON(needs.configure.outputs.docker-config).tags, ' ') }}"
    secrets: inherit

  benchmark-reference-docker:
    name: Benchmark reference (docker)
    needs:
      - configure
      - docker-tenzir-amd64
    if: |
      needs.configure.outputs.run-docker-tenzir == 'true' &&
      (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'release' && !contains(github.event.release.tag_name, '-rc'))
      )
    runs-on: ubuntu-latest
    env:
      BENCHMARK_AWS_ROLE_ARN: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      BENCHMARK_S3_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
      BENCHMARK_S3_PREFIX: ${{ vars.BENCHMARK_S3_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Authenticate to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Benchmark the docker image
        uses: ./.github/actions/benchmark
        with:
          target: ${{ needs.docker-tenzir-amd64.outputs.benchmark-image }}
          publish-results: true
          destination-prefix: >-
            ${{ github.ref_type == 'tag'
                && format('tags/{0}/docker', github.ref_name)
                || format('refs/main/{0}/docker', github.sha) }}

  sync-openapi-to-docs:
    name: Sync OpenAPI to Docs
    needs: [docker-tenzir, configure]
    if: github.ref == 'refs/heads/main' && needs.configure.outputs.run-docker-tenzir == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          repositories: docs

      - name: Trigger docs OpenAPI regeneration
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run generate-openapi-node.yaml \
            --repo tenzir/docs \
            --field tenzir_docker_tag="${{ github.sha }}"

  regression-tests:
    needs:
      - docker-tenzir
      - configure
    if: needs.configure.outputs.run-regression-tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        regression-tests: ${{ fromJson(needs.configure.outputs.version-matrix) }}
    name: Regression Tests (${{ matrix.regression-tests.version }})
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Regression Tests
        run: |
          scripts/regression-tests.sh ${{ matrix.regression-tests.version }} ${{ needs.configure.outputs.tenzir-container-ref }}

  tenzir-static-aarch64-linux:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-nix == 'true' && github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: ubicloud-standard-4-arm
      os: linux
      arch: aarch64
      attribute: tenzir-static
    secrets: inherit

  tenzir-static-x86_64-linux:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-nix == 'true' && github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: ubuntu-latest
      os: linux
      arch: x86_64
      attribute: tenzir-static
    secrets: inherit

  tenzir-static-arm64-darwin:
    name: Nix
    needs: [configure]
    if: needs.configure.outputs.run-tenzir-nix == 'true'
    uses: ./.github/workflows/nix-build-job.yaml
    with:
      runner: macos-15
      os: darwin
      arch: arm64
      attribute: tenzir-static
      notarize_macos: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    secrets: inherit

  docker-slim:
    name: Push tenzir-slim docker manifest
    needs: [tenzir-static-aarch64-linux, tenzir-static-x86_64-linux]
    uses: ./.github/workflows/push-manifest.yaml
    with:
      source-images: "${{ needs.tenzir-static-aarch64-linux.outputs.images }} ${{ needs.tenzir-static-x86_64-linux.outputs.images }}"
      arch-suffixes: "aarch64 x86_64"
    secrets: inherit

  benchmark-reference-static:
    name: Benchmark reference (static)
    needs:
      - configure
      - tenzir-static-x86_64-linux
    if: |
      needs.configure.outputs.run-tenzir-nix == 'true' &&
      (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'release' && !contains(github.event.release.tag_name, '-rc'))
      )
    runs-on: ubuntu-latest
    env:
      BENCHMARK_AWS_ROLE_ARN: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      BENCHMARK_S3_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
      BENCHMARK_S3_PREFIX: ${{ vars.BENCHMARK_S3_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download static benchmark artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: tenzir-static-x86_64-linux
          path: ${{ runner.temp }}/static-artifact
      - name: Benchmark the static binary
        uses: ./.github/actions/benchmark
        with:
          target: ${{ runner.temp }}/static-artifact
          publish-results: true
          destination-prefix: >-
            ${{ github.ref_type == 'tag'
                && format('tags/{0}/static', github.ref_name)
                || format('refs/main/{0}/static', github.sha) }}

  tenzir:
    needs:
      - configure
    if: ${{ needs.configure.outputs.run-tenzir == 'true' }}
    name: Tenzir (${{ matrix.tenzir.name }})
    runs-on: ${{ matrix.tenzir.os }}
    container: ${{ matrix.tenzir.container }}
    strategy:
      fail-fast: false
      matrix:
        tenzir:
          - os: macos-15
            container: null
            name: macOS
            compiler: Clang
            cmake-extra-flags: |
              -DTENZIR_ENABLE_BUNDLED_CAF:BOOL=ON \
              -DTENZIR_ENABLE_BUNDLED_SIMDJSON:BOOL=ON \
              -DTENZIR_PLUGINS_BLACKLIST="from_velociraptor;platform;snowflake"
            bundled-plugins:
              # macOS runners in GitHub Actions CI are very limited, so we
              # prefer to have fewer jobs running and build the proprietary
              # plugins as bundled on macOS.
              - plugins/*
              - contrib/tenzir-plugins/*
    env:
      BUILD_DIR: build
      CCACHE_ABSSTDERR: true
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      # We're intentionally placing the cache dir outside of `${{ github.workspace }}`
      # because that has a weird issue where it switches between `/home/runner` and
      # `/__w/` depending on the current context. See https://github.com/actions/checkout/issues/785
      # and https://github.com/actions/runner/issues/2058.
      # We use `/tmp` because that's writable on both mac and linux runners.
      CCACHE_DIR: "/tmp/ccache"
      CCACHE_NOHASHDIR: true
      CCACHE_SLOPPINESS: "file_macro,time_macros"
      CCACHE_UNIFY: true
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_GENERATOR: Ninja
      CMAKE_MAKE_PROGRAM: ninja
      DEBIAN_FRONTEND: noninteractive
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      HOMEBREW_NO_ANALYTICS: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Tailscale
        if: false && runner.os == 'Linux'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.66.4
          args: --ssh
          # 1. Kernel space networking needs CAP_NET_ADMIN but that is not
          #    available in containerized GitHub Actions jobs.
          # 2. Tailscale SSH doesn't work without an accessible statedir. This
          #    is only needed inside of containerized jobs.
          #    -> https://github.com/tailscale/tailscale/issues/11039
          tailscaled-args: --tun=userspace-networking --state=$HOME/tailscaled.state --statedir=$HOME/var/lib/tailscale
      - name: Configure ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}
      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init --recursive contrib/tenzir-plugins
          git submodule update --init --recursive libtenzir
          git submodule update --init --recursive plugins
          git submodule update --init --recursive tenzir
      - name: Setup Homebrew Clang and Install Dependencies (macOS)
        if: ${{ matrix.tenzir.name == 'macOS' }}
        run: |
          # Use CommandLineTools SDK instead of Xcode's SDK for LLVM compatibility
          sudo xcode-select --switch /Library/Developer/CommandLineTools
          # Setup Homebrew Clang
          brew install llvm
          llvm_root="$(brew --prefix llvm)"
          echo "${llvm_root}/bin" >> $GITHUB_PATH
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BUILD_DIR=build/clang/relwithdebinfo" >> $GITHUB_ENV
            echo "CMAKE_PRESET=macos-clang-relwithdebinfo" >> $GITHUB_ENV
          else
            echo "BUILD_DIR=build/clang/release" >> $GITHUB_ENV
            echo "CMAKE_PRESET=macos-clang-release" >> $GITHUB_ENV
          fi
          # Install all other dependencies.
          ./scripts/macOS/install-dev-dependencies.sh
      - name: Setup Python (macOS)
        if: ${{ matrix.tenzir.name == 'macOS' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Configure Environment
        run: |
          PACKAGE_NAME="$(echo "tenzir-${{ needs.configure.outputs.build-version }}-$(uname -s)-Release-${{ matrix.tenzir.compiler }}" | awk '{ print tolower($0) }')"
          PUBLISH_NAME="$(echo "tenzir-$(uname -s)-Release-${{ matrix.tenzir.compiler }}" | awk '{ print tolower($0) }')"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "PUBLISH_NAME=$PUBLISH_NAME" >> $GITHUB_ENV
      - name: Fetch ccache Cache
        uses: actions/cache/restore@v4
        with:
          # Note that the `path` is implicitly part of the key when looking up cache hits:
          # GitHub will only download artifacts that contain files whose locations matches `path`,
          # so if the `path` changes nothing will be downloaded even if the key name matches.
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.workflow }}-${{ matrix.tenzir.name }}-${{ matrix.tenzir.compiler }}-${{ needs.configure.outputs.ref-slug }}-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-${{ matrix.tenzir.name }}-${{ matrix.tenzir.compiler }}-${{ needs.configure.outputs.ref-slug }}
            ${{ github.workflow }}-${{ matrix.tenzir.name }}-${{ matrix.tenzir.compiler }}-main
            ${{ github.workflow }}-${{ matrix.tenzir.name }}-${{ matrix.tenzir.compiler }}
      - name: Configure
        run: |
          echo "$PATH"
          python3 --version
          python3 -m pip --version
          bash --version
          ccache --version
          # Zero the cache statistics (but not the configuration options).
          ccache --zero-stats
          ccache --show-config
          # Setting different values for CMAKE_INSTALL_PREFIX and
          # CPACK_PACKAGING_INSTALL_PREFIX is currently not supported and causes
          # a warning. We accept this drawback because the package we generate
          # here is built specifically as input for the plugin CI jobs and not
          # suitable for general use.
          cmake --preset "${CMAKE_PRESET}" \
            -DCMAKE_INSTALL_PREFIX:STRING="${PWD}/opt/tenzir" \
            -DCPACK_GENERATOR:STRING=TGZ \
            -DCPACK_PACKAGE_FILE_NAME:STRING="$PACKAGE_NAME" \
            -DCPACK_PACKAGING_INSTALL_PREFIX:STRING="/" \
            -DTENZIR_PLUGINS:STRING="${{ join(matrix.tenzir.bundled-plugins, ';') }}" \
            -DTENZIR_VERSION_BUILD_METADATA:STRING="${{ needs.configure.outputs.tenzir-version-build-metadata }}" \
            ${{ matrix.tenzir.cmake-extra-flags }}
      - name: Compile All Targets
        run: |
          cmake --build "$BUILD_DIR" --target all --parallel --verbose
      - name: Show ccache Statistics
        run: |
          # Print statistics counter IDs and corresponding values.
          ccache --show-stats
          # Print statistics about cache compression.
          ccache --show-compression
      - name: Save ccache Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.workflow }}-${{ matrix.tenzir.name }}-${{ matrix.tenzir.compiler }}-${{ needs.configure.outputs.ref-slug }}-${{ github.sha }}
          enableCrossOsArchive: true
      - name: Run Unit Tests
        env:
          TENZIR_ALLOC_STATS: ${{ matrix.tenzir.name != 'macOS' && '1' || '' }}
          TENZIR_ALLOC_ACTOR_STATS: ${{ matrix.tenzir.name != 'macOS' && '1' || '' }}
        run: |
          cmake --build "$BUILD_DIR" --target unit-tests
      - name: Run Integration Tests
        env:
          TENZIR_ALLOC_STATS: ${{ matrix.tenzir.name != 'macOS' && '1' || '' }}
          TENZIR_ALLOC_ACTOR_STATS: ${{ matrix.tenzir.name != 'macOS' && '1' || '' }}
        run: |
          cmake --build "$BUILD_DIR" --target integration-tests
      - name: Install
        run: |
          cmake --install "$BUILD_DIR"
      - name: Package
        env:
          DESTDIR: ${{ env.PWD }}
        run: |
          cmake --build "$BUILD_DIR" --target package
      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PACKAGE_NAME }}.tar.gz"
          path: "${{ env.BUILD_DIR }}/package/${{ env.PACKAGE_NAME }}.tar.gz"
          if-no-files-found: error
      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDP }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      - name: Configure GCloud Credentials
        if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
        uses: google-github-actions/setup-gcloud@v2
      - name: Upload Artifact to GCS
        if: ${{ github.event_name == 'push' || github.event_name == 'release' }}
        run: |
          gsutil -m cp "${{ env.BUILD_DIR }}/package/${{ env.PACKAGE_NAME }}.tar.gz" "gs://${{ vars.GCS_BUCKET }}/${{ env.PACKAGE_NAME }}.tar.gz"

  python:
    needs:
      - configure
      - docker-tenzir
      - tenzir-static-x86_64-linux
    if: ${{ needs.configure.outputs.run-python == 'true' }}
    name: Python
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: "0.9.2"
          python-version: ${{ matrix.python-version }}
      - name: Install Nix (for static binaries)
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          # Avoid pushing the full enterprise edition.
          pushFilter: "tenzir-ee"
      - name: Install workspace dependencies
        working-directory: python
        run: |
          uv sync --all-packages --group dev
      - name: Run unit tests
        working-directory: python
        run: |
          uv run --all-packages --group dev pytest
      - name: Run tests in Docker
        working-directory: python
        if: matrix.os == 'ubuntu-latest'
        run: |
          export TENZIR_CONTAINER_REF="${{ needs.configure.outputs.tenzir-container-ref }}"
          export TENZIR_CONTAINER_REGISTRY=ghcr.io
          ./docker-uv-run.sh --all-packages --group dev pytest
      - name: Build package
        working-directory: python
        run: |
          uv build --wheel --all-packages

  python-package:
    needs:
      - configure
      - tenzir-static-arm64-darwin
      - tenzir-static-aarch64-linux
      - tenzir-static-x86_64-linux
    if: ${{ needs.configure.outputs.run-python-package == 'true' }}
    name: Python Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: ["macos-15", "ubuntu-latest", "ubicloud-standard-4-arm"]
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@3259c6206f993105e3a61b142c2d97bf4b9ef83d  # v7.1.0
        with:
          version: "0.9.2"
          python-version: ${{ matrix.python-version }}
      - name: Install Nix (for static binaries)
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          # Avoid pushing the full enterprise edition.
          pushFilter: "tenzir-ee"
      - name: Download signed tarball (macOS)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: tenzir-signed-tarball-arm64-darwin
          path: ${{ runner.temp }}/signed-tarball
      - name: Set signed tarball path (macOS)
        if: runner.os == 'macOS'
        run: |
          TARBALL_PATH="$(ls ${{ runner.temp }}/signed-tarball/*.tar.gz)"
          echo "TENZIR_SIGNED_TARBALL_PATH=$TARBALL_PATH" >> "$GITHUB_ENV"
      - name: Build sdist
        working-directory: python
        run: |
          uv build --sdist --package tenzir-common
          uv build --sdist --package tenzir
      - name: Build wheel for validation
        working-directory: python
        run: |
          uv build --wheel --package tenzir-common
          uv build --wheel --package tenzir
      - name: Validate installed wheel exposes working tenzir binary
        working-directory: python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          tenzir version
      - name: Remove platform independent duplicate packages
        if: ${{ ! ( runner.os == 'Linux' && runner.arch == 'X64') }}
        working-directory: python
        run: |
          rm -f dist/*.tar.gz
          rm -f dist/tenzir-common*.whl
      - name: Publish to PyPI
        if: github.event_name == 'release'
        working-directory: python
        run: |
          uv publish --token "${{ secrets.PYPI_TOKEN }}" dist/*
      - name: Publish to Test PyPI
        if: github.event_name != 'release'
        working-directory: python
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ --token "${{ secrets.TEST_PYPI_TOKEN }}" dist/*

  update-homebrew-tap:
    needs:
      - configure
      - tenzir-static-arm64-darwin
    if: github.event_name == 'release'
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download signed package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: tenzir-signed-pkg-arm64-darwin
          path: ${{ runner.temp }}/signed-pkg
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          repositories: homebrew-tenzir
      - name: Prepare tap update
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          pkg_path="$(ls "${{ runner.temp }}/signed-pkg/"*.pkg)"
          sha256="$(shasum -a 256 "$pkg_path" | awk '{print $1}')"
          version="${RELEASE_TAG#v}"
          pkgutil_identifier="$(python3 .github/workflows/nix-build.py print-pkgutil-identifier)"
          {
            echo "HOMEBREW_TAP_SHA256=$sha256"
            echo "HOMEBREW_TAP_VERSION=$version"
            echo "HOMEBREW_TAP_DIR=${{ runner.temp }}/homebrew-tenzir"
            echo "HOMEBREW_TAP_REPO=tenzir/homebrew-tenzir"
            echo "HOMEBREW_PKGUTIL_IDENTIFIER=$pkgutil_identifier"
          } >> "$GITHUB_ENV"

      - name: Clone tap repo
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TAP_REPO: ${{ env.HOMEBREW_TAP_REPO }}
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
        run: |
          git config --global user.name "tenzir-bot"
          git config --global user.email "engineering@tenzir.com"
          git clone "https://x-access-token:${APP_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"

      - name: Render Homebrew cask
        env:
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
          VERSION: ${{ env.HOMEBREW_TAP_VERSION }}
          SHA256: ${{ env.HOMEBREW_TAP_SHA256 }}
          PKGUTIL_IDENTIFIER: ${{ env.HOMEBREW_PKGUTIL_IDENTIFIER }}
        run: |
          python3 scripts/update-homebrew-cask.py \
            --cask "$TAP_DIR/Casks/tenzir.rb" \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --pkgutil-identifier "$PKGUTIL_IDENTIFIER"

      - name: Commit tap update
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TAP_DIR: ${{ env.HOMEBREW_TAP_DIR }}
        run: |
          if git -C "$TAP_DIR" diff --quiet -- Casks/tenzir.rb; then
            echo "Homebrew cask is already up to date"
            exit 0
          fi

          git -C "$TAP_DIR" add Casks/tenzir.rb
          git -C "$TAP_DIR" commit -m "Update tenzir cask to ${RELEASE_TAG}"
          git -C "$TAP_DIR" push origin HEAD

  pass-branch-protections:
    needs:
      - configure
      - docker-tenzir
      - docker-tenzir-amd64
      - docker-tenzir-arm64
      - policy-enforcement
      - python
      - python-package
      - update-homebrew-tap
      # TODO: Re-enable this after v4.26 was released.
      # - regression-tests
      # TODO: Re-enable this when homebrew is fixed (aws-sdk-cpp issue).
      # See: https://github.com/apache/arrow/issues/49347
      # - tenzir
      - tenzir-static-arm64-darwin
      - tenzir-static-aarch64-linux
      - tenzir-static-x86_64-linux
    if: always() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Pass Branch Protections
    steps:
      - name: Failure
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: |
          # This check runs after any other job failed.
          exit 1
      - name: Success
        run: |
          # This check runs after all other jobs are done or skipped
          exit 0
