name: Benchmark references

on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  actions: read
  contents: read
  id-token: write
  packages: read

jobs:
  benchmark:
    if: github.event_name != 'release' || !contains(github.event.release.tag_name, '-rc')
    name: Benchmark reference (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [docker, static]
    env:
      XDG_CACHE_HOME: ${{ runner.temp }}/xdg-cache
      XDG_STATE_HOME: ${{ runner.temp }}/xdg-state
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Checkout tenzir-bench
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: tenzir/bench
          path: .tools/tenzir-bench
      - name: Install benchmark runner
        run: |
          python3 -m pip install ./.tools/tenzir-bench
      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve benchmark target metadata
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${{ github.sha }}"
          event="push"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            ref="${{ github.event.release.tag_name }}"
            event="release"
          fi
          python3 scripts/bench-ci/find_build_run.py fetch-target-metadata \
            --repo "${{ github.repository }}" \
            --ref "$ref" \
            --event "$event" \
            --target "${{ matrix.target }}" \
            --output-dir "$RUNNER_TEMP/benchmark-metadata" > "$RUNNER_TEMP/target.json"
          echo "run-id=$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path("'"$RUNNER_TEMP"'/target.json").read_text())["run_id"])')" >> "$GITHUB_OUTPUT"
          echo "metadata-path=$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path("'"$RUNNER_TEMP"'/target.json").read_text())["metadata_path"])')" >> "$GITHUB_OUTPUT"
      - name: Materialize static benchmark target
        if: matrix.target == 'static'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_METADATA_PATH: ${{ steps.target.outputs.metadata-path }}
          RESOLVED_TARGET_PATH: ${{ runner.temp }}/resolved-target.json
        run: |
          gh run download "${{ steps.target.outputs.run-id }}" \
            --repo "${{ github.repository }}" \
            --name tenzir-static-x86_64-linux \
            --dir "$RUNNER_TEMP/static-artifact"
          tarball="$(find "$RUNNER_TEMP/static-artifact" -type f -name '*.tar.gz' | head -n1)"
          mkdir -p "$RUNNER_TEMP/static-extracted"
          tar -xzf "$tarball" -C "$RUNNER_TEMP/static-extracted"
          binary="$(find "$RUNNER_TEMP/static-extracted" -type f -path '*/bin/tenzir' | head -n1)"
          TARGET_BINARY="$binary" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path(os.environ["TARGET_METADATA_PATH"]).read_text(encoding="utf-8"))
          metadata["path"] = os.environ["TARGET_BINARY"]
          Path(os.environ["RESOLVED_TARGET_PATH"]).write_text(json.dumps(metadata, indent=2), encoding="utf-8")
          PY
      - name: Materialize docker benchmark target
        if: matrix.target == 'docker'
        run: |
          cp "${{ steps.target.outputs.metadata-path }}" "$RUNNER_TEMP/resolved-target.json"
      - name: Configure AWS credentials
        if: vars.BENCHMARK_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      - name: Validate benchmark storage configuration
        env:
          BENCHMARK_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
        run: |
          if [[ -z "$BENCHMARK_BUCKET" ]]; then
            echo "::error::BENCHMARK_S3_BUCKET must be configured for benchmark publishing"
            exit 1
          fi
      - name: Run and publish benchmark references
        env:
          BENCHMARK_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
          BENCHMARK_PREFIX: ${{ vars.BENCHMARK_S3_PREFIX }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            ref_prefix="refs/tags/${{ github.event.release.tag_name }}/${{ matrix.target }}"
          else
            ref_prefix="refs/main/${{ github.sha }}/${{ matrix.target }}"
          fi
          destination="s3://${BENCHMARK_BUCKET}/${BENCHMARK_PREFIX:+$BENCHMARK_PREFIX/}${ref_prefix}"
          python3 scripts/bench-ci/run_benchmarks.py reference \
            --bench-root bench \
            --build "$RUNNER_TEMP/resolved-target.json" \
            --destination "$destination"
