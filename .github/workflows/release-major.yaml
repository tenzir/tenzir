name: Release (Major)

on:
  workflow_dispatch:
    inputs:
      intro:
        description: |
          Intro of the release

          The intro should be 1-2 sentences long, must be written in active
          voice, and should clearly communicate the theme of the release to the
          user. Use full sentences and avoid abbreviations.
        required: true
        type: string
      title:
        description: |
          User-facing release title (auto-generated if omitted)
        required: false
        type: string
      skip_publish:
        description: Skip publish/tag/branch updates (dry run)
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: ./.github/workflows/release.yaml
    with:
      bump: major
      intro: ${{ inputs.intro }}
      title: ${{ inputs.title }}
      skip_publish: ${{ inputs.skip_publish }}
    secrets: inherit
