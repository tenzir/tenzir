name: AWS Marketplace Release

permissions:
  id-token: write

on:
  release:
    types: [published]

  # Manual dispatch for testing.
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tenzir Node Version to publish'
        required: true
        type: string
      existing_image:
        description: 'Name of an existing Docker image to use (optional)'
        required: false
        type: string


jobs:
  marketplace-release:
    name: Build and Push AWS Marketplace Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository at version tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init --recursive libtenzir
          git submodule update --init --recursive plugins
          git submodule update --init --recursive tenzir

      - name: Configure ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TENZIR_PLUGINS_DEPLOY_KEY }}

      - name: Update private submodules
        run: |
          git submodule update --init --recursive contrib/tenzir-plugins

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to ghcr before the build because we use it for caching.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tenzir-bot
          password: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}

      # In theory it should be possible to assume this role directly, at least it's
      # trust policy is permitting this. But somewhere along the stack there's a check
      # that the OIDC provider is in the same AWS account as the role we're trying to
      # assume, so we're using this two-step chain as a workaround.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::622024652768:role/ecr-tenzir-ce-github-access
          aws-region: eu-west-1
          role-session-name: GithubActionsCISession
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::390844774768:role/aws-marketplace-github-access
          aws-region: eu-west-1
          role-session-name: GithubActionsCISession
          role-skip-session-tagging: true
          role-chaining: true

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_REGION: us-east-1
        with:
          registries: 709825985650

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Build and Push Marketplace Image
        if: (github.event.inputs.existing_image == '' || github.event.inputs.existing_image == null)
        env:
          # TODO: add multi-arch support
          PLATFORM: linux/amd64
          CACHE_TAG: ghcr.io/tenzir/tenzir:amd64-build-cache
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}
        run: |
          docker buildx build . \
            -t 709825985650.dkr.ecr.us-east-1.amazonaws.com/tenzir/tenzir-node:${RELEASE_TAG} \
            --target tenzir-node \
            --platform ${PLATFORM} \
            --cache-from "type=registry,ref=${CACHE_TAG}" \
            --push

      - name: Tag and Push Existing Image
        if: github.event.inputs.existing_image != ''
        env:
          EXISTING_IMAGE: ${{ github.event.inputs.existing_image }}
          RELEASE_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          docker pull "${EXISTING_IMAGE}"
          docker tag "${EXISTING_IMAGE}" 709825985650.dkr.ecr.us-east-1.amazonaws.com/tenzir/tenzir-node:${RELEASE_TAG}
          docker push 709825985650.dkr.ecr.us-east-1.amazonaws.com/tenzir/tenzir-node:${RELEASE_TAG}

      - name: Add new version to AWS Marketplace
        env:
          AWS_REGION: us-east-1
          PRODUCT_ID: prod-ygvc26drdwwlq
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}
        # This is following the process described here:
        # https://docs.aws.amazon.com/marketplace/latest/APIReference/work-with-container-products.html#working-with-container-products
        run: |
          cat > add-version.json <<EOF
          {
            "Catalog": "AWSMarketplace",
            "ChangeSet": [
              {
                "ChangeType": "AddDeliveryOptions",
                "Entity": {
                  "Identifier": "$PRODUCT_ID",
                  "Type": "ContainerProduct@1.0"
                },
                "DetailsDocument": {
                  "Version": {
                    "VersionTitle": "Tenzir Node $RELEASE_TAG",
                    "ReleaseNotes": "See https://docs.tenzir.com/changelog/node/ for release notes."
                  },
                  "DeliveryOptions": [
                    {
                      "DeliveryOptionTitle": "ECS Container image only delivery option",
                      "Details": {
                        "EcrDeliveryOptionDetails": {
                          "ContainerImages": [
                            "709825985650.dkr.ecr.us-east-1.amazonaws.com/tenzir/tenzir-node:$RELEASE_TAG"
                          ],
                          "CompatibleServices": ["ECS"],
                          "Description": "Tenzir Node container image for AWS Marketplace (ECS)",
                          "UsageInstructions": "docker pull 709825985650.dkr.ecr.us-east-1.amazonaws.com/tenzir/tenzir-node:$RELEASE_TAG"
                        }
                      }
                    }
                  ]
                }
              }
            ]
          }
          EOF
          aws marketplace-catalog start-change-set \
            --region "$AWS_REGION" \
            --cli-input-json file://add-version.json
