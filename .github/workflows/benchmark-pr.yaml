name: Benchmark pull requests

on:
  issue_comment:
    types:
      - created

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  packages: read
  pull-requests: read

jobs:
  benchmark:
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '@tenzir-bot bench') ||
        startsWith(github.event.comment.body, '@tenzir-bot benchmark') ||
        contains(toJSON(github.event.comment.body), '\\n@tenzir-bot bench') ||
        contains(toJSON(github.event.comment.body), '\\n@tenzir-bot benchmark')
      )
    runs-on: ubuntu-latest
    env:
      TENZIR_BENCH_RUNNER_CLASS: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Configure benchmark runtime directories
        run: |
          echo "XDG_CACHE_HOME=$RUNNER_TEMP/xdg-cache" >> "$GITHUB_ENV"
          echo "XDG_STATE_HOME=$RUNNER_TEMP/xdg-state" >> "$GITHUB_ENV"
      - name: Verify commenter permission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          permission="$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission --jq .permission)"
          case "$permission" in
            admin|maintain|write) ;;
            *)
              echo "::error::${{ github.event.comment.user.login }} does not have write access"
              exit 1
              ;;
          esac
      - name: Parse benchmark command
        id: parse
        continue-on-error: true
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 scripts/bench-ci/parse_command.py \
            --comment-body "$COMMENT_BODY" > "$RUNNER_TEMP/request.json" \
            2> "$RUNNER_TEMP/parse-error.txt"
      - name: React to accepted benchmark request
        if: steps.parse.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          if ! gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -f content='+1' > /dev/null
          then
            echo "::warning::Failed to add +1 reaction to the benchmark request comment"
          fi
      - name: React to invalid benchmark request
        if: steps.parse.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          if ! gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -f content='-1' > /dev/null
          then
            echo "::warning::Failed to add -1 reaction to the invalid benchmark request comment"
          fi
      - name: Reject invalid benchmark request
        if: steps.parse.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/parse-error.txt" >&2
          exit 1
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Checkout tenzir-bench
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: tenzir/bench
          path: .tools/tenzir-bench
      - name: Install benchmark runner
        run: |
          python3 -m pip install ./.tools/tenzir-bench
      - name: Resolve pull request metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefOid,isCrossRepository > "$RUNNER_TEMP/pr-metadata.json"
      - name: Reject fork pull requests
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path(os.environ["PR_METADATA_FILE"]).read_text(encoding="utf-8"))
          if metadata.get("isCrossRepository"):
              raise SystemExit(
                  "::error::/bench does not execute candidate artifacts from fork pull requests",
              )
          Path(os.environ["HEAD_SHA_FILE"]).write_text(
              str(metadata["headRefOid"]),
              encoding="utf-8",
          )
          PY
        env:
          PR_METADATA_FILE: ${{ runner.temp }}/pr-metadata.json
          HEAD_SHA_FILE: ${{ runner.temp }}/pr-head-sha
      - name: Resolve default baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/bench-ci/resolve_baselines.py --repo "${{ github.repository }}" > "$RUNNER_TEMP/baselines.json"
      - name: Authenticate to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials
        if: vars.BENCHMARK_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      - name: Validate benchmark storage configuration
        env:
          BENCHMARK_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
        run: |
          if [[ -z "$BENCHMARK_BUCKET" ]]; then
            echo "::error::BENCHMARK_S3_BUCKET must be configured for benchmark comparisons"
            exit 1
          fi
      - name: Resolve benchmark targets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/bench-ci/resolve_compare_manifest.py \
            --repo "${{ github.repository }}" \
            --request-json "$RUNNER_TEMP/request.json" \
            --baselines-json "$RUNNER_TEMP/baselines.json" \
            --head-sha-file "$RUNNER_TEMP/pr-head-sha" \
            --output "$RUNNER_TEMP/compare-manifest.json" \
            --bucket "${{ vars.BENCHMARK_S3_BUCKET }}" \
            --prefix "${{ vars.BENCHMARK_S3_PREFIX }}"
      - name: Run benchmark comparisons
        run: |
          mapfile -t manifest_lines < <(python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path(os.environ["MANIFEST_FILE"]).read_text(encoding="utf-8"))
          for benchmark in manifest["benchmarks"]:
              print(f"benchmark={benchmark}")
          for value in manifest["builds"]:
              print(f"build={value}")
          PY
          )
          args=()
          for entry in "${manifest_lines[@]}"; do
            case "$entry" in
              benchmark=*)
                args+=(--benchmark "${entry#benchmark=}")
                ;;
              build=*)
                args+=(--build "${entry#build=}")
                ;;
            esac
          done
          python3 scripts/bench-ci/run_benchmarks.py compare \
            --bench-root bench \
            "${args[@]}" \
            --markdown-output "$RUNNER_TEMP/benchmark-comment.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_FILE: ${{ runner.temp }}/compare-manifest.json
      - name: Update pull request comment
        env:
          BENCHMARK_COMMENT_AUTHOR_LOGIN: tenzir-bot
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          python3 scripts/bench-ci/update_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.issue.number }}" \
            --body-file "$RUNNER_TEMP/benchmark-comment.md"
