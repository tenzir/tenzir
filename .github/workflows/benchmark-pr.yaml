name: Benchmark pull requests

on:
  issue_comment:
    types:
      - created

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  packages: read
  pull-requests: read

jobs:
  benchmark:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/bench')
    runs-on: ubuntu-latest
    env:
      TENZIR_BENCH_RUNNER_CLASS: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Configure benchmark runtime directories
        run: |
          echo "XDG_CACHE_HOME=$RUNNER_TEMP/xdg-cache" >> "$GITHUB_ENV"
          echo "XDG_STATE_HOME=$RUNNER_TEMP/xdg-state" >> "$GITHUB_ENV"
      - name: Verify commenter permission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          permission="$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission --jq .permission)"
          case "$permission" in
            admin|maintain|write) ;;
            *)
              echo "::error::${{ github.event.comment.user.login }} does not have write access"
              exit 1
              ;;
          esac
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Checkout tenzir-bench
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: tenzir/bench
          path: .tools/tenzir-bench
      - name: Install benchmark runner
        run: |
          python3 -m pip install ./.tools/tenzir-bench
      - name: Parse benchmark command
        run: |
          python3 scripts/bench-ci/parse_command.py \
            --comment-body "${{ github.event.comment.body }}" > "$RUNNER_TEMP/request.json"
      - name: Resolve pull request metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefOid,isCrossRepository > "$RUNNER_TEMP/pr-metadata.json"
      - name: Reject fork pull requests
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path(os.environ["PR_METADATA_FILE"]).read_text(encoding="utf-8"))
          if metadata.get("isCrossRepository"):
              raise SystemExit(
                  "::error::/bench does not execute candidate artifacts from fork pull requests",
              )
          Path(os.environ["HEAD_SHA_FILE"]).write_text(
              str(metadata["headRefOid"]),
              encoding="utf-8",
          )
          PY
        env:
          PR_METADATA_FILE: ${{ runner.temp }}/pr-metadata.json
          HEAD_SHA_FILE: ${{ runner.temp }}/pr-head-sha
      - name: Resolve default baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/bench-ci/resolve_baselines.py --repo "${{ github.repository }}" > "$RUNNER_TEMP/baselines.json"
      - name: Authenticate to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure AWS credentials
        if: vars.BENCHMARK_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ vars.BENCHMARK_AWS_ROLE_ARN }}
      - name: Validate benchmark storage configuration
        env:
          BENCHMARK_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
        run: |
          if [[ -z "$BENCHMARK_BUCKET" ]]; then
            echo "::error::BENCHMARK_S3_BUCKET must be configured for benchmark comparisons"
            exit 1
          fi
      - name: Resolve benchmark targets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BENCHMARK_BUCKET: ${{ vars.BENCHMARK_S3_BUCKET }}
          BENCHMARK_PREFIX: ${{ vars.BENCHMARK_S3_PREFIX }}
          REQUEST_JSON: ${{ runner.temp }}/request.json
          BASELINES_JSON: ${{ runner.temp }}/baselines.json
          HEAD_SHA_FILE: ${{ runner.temp }}/pr-head-sha
          MANIFEST_FILE: ${{ runner.temp }}/compare-manifest.json
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          request = json.loads(Path(os.environ["REQUEST_JSON"]).read_text(encoding="utf-8"))
          baselines = json.loads(Path(os.environ["BASELINES_JSON"]).read_text(encoding="utf-8"))
          head_sha = Path(os.environ["HEAD_SHA_FILE"]).read_text(encoding="utf-8").strip()
          repo = os.environ["GITHUB_REPOSITORY"]
          run_temp = Path(os.environ["RUNNER_TEMP"])
          build_specs = []

          def storage_prefix(ref_kind: str, ref_value: str, target: str) -> str:
            prefix = os.environ.get("BENCHMARK_PREFIX", "").strip("/")
            stem = f"s3://{os.environ['BENCHMARK_BUCKET']}/"
            if prefix:
              stem += f"{prefix}/"
            if ref_kind == "main":
              return f"{stem}refs/main/{ref_value}/{target}"
            return f"{stem}refs/tags/{ref_value}/{target}"

          def infer_event(ref: str) -> str | None:
            if ref == "main":
              return "push"
            if ref.startswith("v"):
              return "release"
            return None

          def fetch(ref: str, target: str, destination: Path, *, event: str | None = None) -> dict:
            command = [
              "python3",
              "scripts/bench-ci/find_build_run.py",
              "fetch-target-metadata",
              "--repo",
              repo,
              "--ref",
              ref,
              "--target",
              target,
              "--output-dir",
              str(destination),
            ]
            if event is not None:
              command.extend(["--event", event])
            if event == "release":
              command.append("--allow-missing-artifact")
            result = subprocess.run(
              command,
              check=True,
              capture_output=True,
              text=True,
            )
            return json.loads(result.stdout)

          def materialize(metadata_path: Path, target: str, label: str, run_id: int) -> Path:
            payload = json.loads(metadata_path.read_text(encoding="utf-8"))
            payload["label"] = label
            safe_label = label.replace(" ", "-").replace("/", "-")
            if target == "static":
              artifact_dir = run_temp / f"artifact-{safe_label}"
              subprocess.run(
                [
                  "gh", "run", "download", str(run_id),
                  "--repo", repo,
                  "--name", "tenzir-static-x86_64-linux",
                  "--dir", str(artifact_dir),
                ],
                check=True,
                capture_output=True,
                text=True,
              )
              tarballs = sorted(artifact_dir.rglob("*.tar.gz"))
              if not tarballs:
                raise RuntimeError(f"no tarball found for {label}")
              extracted = run_temp / f"extract-{safe_label}"
              extracted.mkdir(parents=True, exist_ok=True)
              subprocess.run(["tar", "-xzf", str(tarballs[0]), "-C", str(extracted)], check=True)
              binaries = sorted(extracted.rglob("bin/tenzir"))
              if not binaries:
                raise RuntimeError(f"no tenzir binary found for {label}")
              payload["path"] = str(binaries[0])
            resolved = run_temp / f"{safe_label}.json"
            resolved.write_text(json.dumps(payload, indent=2), encoding="utf-8")
            return resolved

          def prepare_storage_backed(metadata_path: Path, target: str, label: str, run_id: int, storage: str) -> Path:
            payload = json.loads(metadata_path.read_text(encoding="utf-8"))
            payload["label"] = label
            payload["run_id"] = run_id
            payload["storage_prefix"] = storage
            safe_label = label.replace(" ", "-").replace("/", "-")
            resolved = run_temp / f"{safe_label}.json"
            resolved.write_text(json.dumps(payload, indent=2), encoding="utf-8")
            return resolved

          for target in request["targets"]:
            target_dir = run_temp / f"candidate-{target}"
            candidate = fetch(head_sha, target, target_dir, event="pull_request")
            candidate_path = materialize(Path(candidate["metadata_path"]), target, f"candidate {target}", int(candidate["run_id"]))
            build_specs.append(str(candidate_path))

            main_sha = baselines["main_sha"]
            stable_tag = baselines["latest_stable_tag"]
            main_result = subprocess.run(
              [
                "python3",
                "scripts/bench-ci/find_build_run.py",
                "fetch-latest-target-metadata",
                "--repo",
                repo,
                "--branch",
                "main",
                "--event",
                "push",
                "--target",
                target,
                "--output-dir",
                str(run_temp / f"main-{target}"),
              ],
              check=True,
              capture_output=True,
              text=True,
            )
            main = json.loads(main_result.stdout)
            main_sha = str(main["resolved_sha"])
            main_path = prepare_storage_backed(
              Path(main["metadata_path"]),
              target,
              f"main {target}",
              int(main["run_id"]),
              storage_prefix("main", main_sha, target),
            )
            build_specs.append(str(main_path))

            if stable_tag:
              release = fetch(stable_tag, target, run_temp / f"stable-{target}", event="release")
              if release.get("available", True):
                release_path = prepare_storage_backed(
                  Path(release["metadata_path"]),
                  target,
                  f"latest stable {target}",
                  int(release["run_id"]),
                  storage_prefix("tag", stable_tag, target),
                )
                build_specs.append(str(release_path))
              else:
                print(f"Skipping latest stable baseline for {target}: {release['reason']}")

          for selector in request["refs"]:
            target = selector["target"]
            ref = selector["ref"]
            event = infer_event(ref)
            extra = fetch(ref, target, run_temp / f"extra-{target}-{ref}", event=event)
            if not extra.get("available", True):
              print(f"Skipping {target}@{ref}: {extra['reason']}")
              continue
            if ref == "main":
              extra_path = prepare_storage_backed(
                Path(extra["metadata_path"]),
                target,
                f"{target}@{ref}",
                int(extra["run_id"]),
                storage_prefix("main", str(extra["resolved_sha"]), target),
              )
            elif event == "release":
              extra_path = prepare_storage_backed(
                Path(extra["metadata_path"]),
                target,
                f"{target}@{ref}",
                int(extra["run_id"]),
                storage_prefix("tag", ref, target),
              )
            else:
              extra_path = materialize(Path(extra["metadata_path"]), target, f"{target}@{ref}", int(extra["run_id"]))
            build_specs.append(str(extra_path))

          Path(os.environ["MANIFEST_FILE"]).write_text(
            json.dumps(
              {
                "benchmarks": request["benchmarks"],
                "builds": build_specs,
              },
              indent=2,
            ),
            encoding="utf-8",
          )
          PY
      - name: Run benchmark comparisons
        run: |
          mapfile -t manifest_lines < <(python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path(os.environ["MANIFEST_FILE"]).read_text(encoding="utf-8"))
          for benchmark in manifest["benchmarks"]:
              print(f"benchmark={benchmark}")
          for value in manifest["builds"]:
              print(f"build={value}")
          PY
          )
          args=()
          for entry in "${manifest_lines[@]}"; do
            case "$entry" in
              benchmark=*)
                args+=(--benchmark "${entry#benchmark=}")
                ;;
              build=*)
                args+=(--build "${entry#build=}")
                ;;
            esac
          done
          python3 scripts/bench-ci/run_benchmarks.py compare \
            --bench-root bench \
            "${args[@]}" \
            --markdown-output "$RUNNER_TEMP/benchmark-comment.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_FILE: ${{ runner.temp }}/compare-manifest.json
      - name: Update pull request comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/bench-ci/update_pr_comment.py \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.issue.number }}" \
            --body-file "$RUNNER_TEMP/benchmark-comment.md"
