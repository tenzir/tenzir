name: Nix Build Job
on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
      os:
        type: string
        required: true
      arch:
        type: string
        required: true
      attribute:
        type: string
        required: true
      build-version:
        type: string
        required: true
      run-tests:
        type: boolean
        required: false
        default: true
        description: "Run installation tests and tenzir-test after build"
      notarize_macos:
        type: boolean
        required: false
        default: false
        description: "Notarize signed macOS installer package"
    outputs:
      images:
        description: "Space-separated list of pushed image URLs"
        value: ${{ jobs.build.outputs.images }}

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    name: ${{ inputs.attribute }}-${{ inputs.arch }}-${{ inputs.os }}
    runs-on: ${{ inputs.runner }}
    outputs:
      images: ${{ steps.push.outputs.images }}
    steps:
      - name: Ensure XDG_RUNTIME_DIR
        # This env variable is used by skopeo / buildah / podman, but isn't
        # set on ubicloud runners.
        if: runner.os == 'Linux'
        run: |
          if [[ -z "$XDG_RUNTIME_DIR" ]]; then
            XDG_RUNTIME_DIR="/run/user/$(id -u)"
            mkdir -p "$XDG_RUNTIME_DIR"
            echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          fi
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Tailscale
        if: false
        uses: tailscale/github-action@a392da0a182bba0e9613b6243ebd69529b1878aa  # v4.1.0
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.66.4
          args: --ssh
      - name: Install Nix
        uses: cachix/install-nix-action@7ab6e7fd29da88e74b1e314a4ae9ac6b5cda3801  # v31.8.0
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/0d70460758949966e91d9ecb823b821f963cefbb.tar.gz
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Cachix
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad  # v16
        with:
          name: tenzir
          authToken: "${{ secrets.CACHIX_TENZIR_API_TOKEN }}"
          pushFilter: "(tenzir-ee|tenzir-plugins-source)"
      - name: Prepare ccache directory
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /tmp/tenzir-ccache
          sudo chmod 1777 /tmp/tenzir-ccache
          sudo rm -f \
            /tmp/tenzir-ccache/remote-only \
            /tmp/tenzir-ccache/s3.sock \
            /tmp/tenzir-ccache/s3-helper.pid
      - name: Configure ccache AWS credentials
        if: runner.os == 'Linux' && vars.CCACHE_S3_BUCKET != '' && vars.CCACHE_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7  # v6.0.0
        with:
          role-to-assume: ${{ vars.CCACHE_AWS_ROLE_ARN }}
          aws-region: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
      - name: Start ccache S3 helper
        if: runner.os == 'Linux'
        env:
          CCACHE_S3_BUCKET: ${{ vars.CCACHE_S3_BUCKET }}
          CCACHE_S3_PREFIX: ${{ vars.CCACHE_S3_PREFIX || 'ccache' }}
          CCACHE_S3_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
          CCACHE_S3_AUTH: ${{ vars.CCACHE_S3_AUTH }}
          CCACHE_R2_OIDC_BROKER_URL: ${{ vars.CCACHE_R2_OIDC_BROKER_URL }}
          CCACHE_R2_OIDC_AUDIENCE: ${{ vars.CCACHE_R2_OIDC_AUDIENCE || 'ccache-r2-broker' }}
          AWS_ENDPOINT_URL_S3: ${{ vars.CCACHE_S3_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
          AWS_REGION: ${{ vars.CCACHE_S3_REGION || 'eu-central-1' }}
        run: |
          if [[ -z "${CCACHE_S3_BUCKET}" ]]; then
            echo "::notice::CCACHE_S3_BUCKET is unset, skipping ccache S3 helper"
            exit 0
          fi
          sudo touch /tmp/tenzir-ccache/remote-only
          sudo chmod 0666 /tmp/tenzir-ccache/remote-only
          nix-shell -p 'python3.withPackages (ps: [ ps.boto3 ])' --run '
            python_bin="$(command -v python3)"
            nohup "$python_bin" scripts/ccache/s3-storage-helper.py \
              --endpoint /tmp/tenzir-ccache/s3.sock \
              --url "s3://${CCACHE_S3_BUCKET}/${CCACHE_S3_PREFIX}" \
              --idle-timeout 0 \
              --socket-mode 0666 \
              >/tmp/ccache-s3-helper.log 2>&1 &
            echo $! | sudo tee /tmp/tenzir-ccache/s3-helper.pid >/dev/null
          '
          sleep 1
          sudo test -S /tmp/tenzir-ccache/s3.sock
      - name: Import Apple signing certificates
        id: import_apple_signing_certificates
        if: runner.os == 'macOS'
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Developer ID Application certificate (for signing binaries)
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Import Developer ID Installer certificate (for signing .pkg)
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer_certificate.p12"
          echo "${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}" | base64 --decode > "$INSTALLER_CERT_PATH"
          security import "$INSTALLER_CERT_PATH" \
            -P "${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$INSTALLER_CERT_PATH"

          # Add keychain to search list and set as default
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | tr -d '"')"
          security default-keychain -s "$KEYCHAIN_PATH"

          # Allow codesign and productsign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Extract signing identity names from certificates
          # Application identity (for codesign)
          APP_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "APPLE_SIGNING_IDENTITY=$APP_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "::notice::Application signing identity: $APP_IDENTITY"

          # Installer identity (for productsign)
          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID Installer" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "APPLE_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "APPLE_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
          echo "::notice::Installer signing identity: $INSTALLER_IDENTITY"
      - name: Validate Apple signing identities
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ steps.import_apple_signing_certificates.outputs.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ steps.import_apple_signing_certificates.outputs.APPLE_INSTALLER_IDENTITY }}
        run: |
          if [[ -z "${APPLE_SIGNING_IDENTITY}" ]]; then
            echo "::error::APPLE_SIGNING_IDENTITY is empty"
            exit 1
          fi
          if [[ -z "${APPLE_INSTALLER_IDENTITY}" ]]; then
            echo "::error::APPLE_INSTALLER_IDENTITY is empty"
            exit 1
          fi
      - name: Setup Apple notarization credentials
        if: runner.os == 'macOS' && (github.event_name == 'release' || inputs.notarize_macos)
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER_ID=${{ secrets.APPLE_API_ISSUER_ID }}" >> "$GITHUB_ENV"
      # =========================================================================
      # Build Phase
      # =========================================================================
      - name: Build
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          release_flag=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_flag="--release"
          fi
          nix-shell -p git \
            --run "python3 .github/workflows/nix-build.py build --attribute ${{ inputs.attribute }}.unchecked $release_flag"

      # =========================================================================
      # Test Phase
      # =========================================================================
      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
        run: |
          release_flag=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_flag="--release"
          fi
          nix-shell -p git \
            --run "python3 .github/workflows/nix-build.py build --attribute ${{ inputs.attribute }} $release_flag"
      - name: Run package tests
        if: runner.os == 'Linux' && inputs.run-tests
        run: |
          python3 .github/workflows/nix-build.py package-test \
            --package-dir ${{ steps.build.outputs.package-dir }} \
            --arch ${{ inputs.arch }} \
            --test-root test \
            --test-pattern "tests/functions/time"
      # =========================================================================
      # Sign Phase (macOS only)
      # =========================================================================
      - name: Sign Packages
        id: sign
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ steps.import_apple_signing_certificates.outputs.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ steps.import_apple_signing_certificates.outputs.APPLE_INSTALLER_IDENTITY }}
        run: |
          args=(--package-dir ${{ steps.build.outputs.package-dir }})
          if [[ "${{ github.event_name }}" == "release" || "${{ inputs.notarize_macos }}" == "true" ]]; then
            args+=(--notarize-macos)
          fi
          python3 .github/workflows/nix-build.py sign "${args[@]}"

      # =========================================================================
      # Upload Phase
      # =========================================================================

      - name: Upload Packages to GitHub Actions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ${{ inputs.attribute }}-${{ inputs.arch }}-${{ inputs.os }}
          path: ${{ steps.build.outputs.package-dir }}/
          if-no-files-found: error
      - name: Write benchmark target metadata
        if: runner.os == 'Linux' && inputs.attribute == 'tenzir-static' && inputs.arch == 'x86_64' && inputs.os == 'linux'
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark-target"
          cat > "$RUNNER_TEMP/benchmark-target/benchmark-target-static-x86_64-linux.json" <<EOF
          {
            "kind": "static",
            "target": "static",
            "arch": "x86_64",
            "sha": "${{ github.sha }}",
            "version": "${{ inputs.build-version }}",
            "artifact_name": "${{ inputs.attribute }}-${{ inputs.arch }}-${{ inputs.os }}"
          }
          EOF
      - name: Upload benchmark target metadata
        if: runner.os == 'Linux' && inputs.attribute == 'tenzir-static' && inputs.arch == 'x86_64' && inputs.os == 'linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: benchmark-target-static-x86_64-linux
          path: ${{ runner.temp }}/benchmark-target/benchmark-target-static-x86_64-linux.json
          if-no-files-found: error
      - name: Upload Signed Tarball to GitHub Actions
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tenzir-signed-tarball-${{ inputs.arch }}-${{ inputs.os }}
          path: ${{ steps.sign.outputs.package-dir }}/*.tar.gz
          retention-days: 1
      - name: Upload Signed Pkg to GitHub Actions
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tenzir-signed-pkg-${{ inputs.arch }}-${{ inputs.os }}
          path: ${{ steps.sign.outputs.package-dir }}/*.pkg
          retention-days: 1
      - name: Upload Packages to GCS and GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
          RCLONE_GCS_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCS_SERVICE_ACCOUNT_CREDENTIALS }}
          RCLONE_GCS_BUCKET_POLICY_ONLY: True
        run: |
          # Determine package directory (signed on macOS, build output on Linux)
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            pkg_dir="${{ steps.sign.outputs.package-dir }}"
          else
            pkg_dir="${{ steps.build.outputs.package-dir }}"
          fi
          # Build upload arguments based on event type
          args=(--package-dir "$pkg_dir")
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            args+=(--package-store gcs:tenzir-dist-public/packages/main --package-alias main)
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            version="${GITHUB_REF#refs/tags/}"
            args+=(
              --package-store gcs:tenzir-dist-public/packages/main
              --package-alias latest
              --release-tag "$version"
            )
          fi
          nix-shell -p rclone \
            --run "python3 .github/workflows/nix-build.py upload ${args[*]}"

      # =========================================================================
      # Push Phase (container images, Linux only)
      # =========================================================================
      - name: Push Container Images
        id: push
        if: runner.os == 'Linux'
        env:
          GHCR_TOKEN: ${{ secrets.TENZIR_BOT_GITHUB_TOKEN }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          # Determine push arguments based on event type
          release_flag=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_flag="--release"
          fi
          args=(--attribute ${{ inputs.attribute }} --arch ${{ inputs.arch }} $release_flag)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: push to ghcr.io only with branch slug tag
            branch_slug=$(echo "${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
            args+=(--container-tag "$branch_slug" --image-registry ghcr.io)
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Push to main: push to every registry except Docker Hub
            args+=(
              --container-tag main --container-tag "${{ github.sha }}"
              --image-registry ghcr.io --image-registry 622024652768.dkr.ecr.eu-west-1.amazonaws.com
            )
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # Release: push to every registry, including Docker Hub, with version tags
            version="${GITHUB_REF#refs/tags/}"
            args+=(
              --container-tag latest --container-tag "${{ github.sha }}" --container-tag "$version"
              --image-registry ghcr.io --image-registry docker.io --image-registry 622024652768.dkr.ecr.eu-west-1.amazonaws.com
            )
          fi
          nix-shell -p 'python3.withPackages (ps: [ ps.boto3 ])' skopeo \
            --run "python3 .github/workflows/nix-build.py push ${args[*]}"
      - name: Stop ccache storage helpers
        if: always() && runner.os == 'Linux'
        run: |
          if [[ -f /tmp/tenzir-ccache/s3-helper.pid ]]; then
            sudo kill "$(cat /tmp/tenzir-ccache/s3-helper.pid)" || true
          fi
