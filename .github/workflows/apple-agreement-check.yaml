name: Apple Agreement Check

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: apple-agreement-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: Check agreements
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1
        with:
          ruby-version: "3.4"
      - name: Check Apple Developer agreements
        run: ruby .github/scripts/check-apple-agreements.rb

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: check
    if: always() && needs.check.result == 'failure' && github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_ENGINEERING_WEBHOOK_URL }}
        run: |
          .github/scripts/notify-slack.sh \
            "Apple agreement check failed" \
            "An Apple Developer agreement may require attention, or the App Store Connect API check failed."
