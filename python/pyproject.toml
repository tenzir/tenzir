[tool.uv.workspace]
members = [
  "tenzir-common",
  "tenzir-operator",
  "tenzir",
]

[tool.uv.sources]
tenzir-common = { workspace = true }
tenzir-operator = { workspace = true }
tenzir = { workspace = true }

[dependency-groups]
dev = [
  "mypy>=1.20.1",
  "pytest>=9.0.3,<10.0",
  "pytest-asyncio>=1.3.0,<2.0.0",
  "ruff>=0.15.10",
]

[tool.pytest.ini_options]
asyncio_mode = "auto" # required for async fixtures

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
files = [
  "tenzir/src/tenzir",
  "tenzir-common/src/tenzir_common",
  "tenzir-operator/src/tenzir_operator",
]

[[tool.mypy.overrides]]
module = [
  "dynaconf",
  "pyarrow",
]
ignore_missing_imports = true

[tool.ruff.lint]
select = ["ALL"]
ignore = ["FA", "D1"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
